<h3>추천 선물</h3>
<ul>
<li><strong>감성 디저트</strong> — 마카롱, 수제 초콜릿 (달콤한 마음 전달)</li>
<li><strong>미니 꽃다발</strong> — 대형 꽃다발은 부담, 미니는 센스</li>
<li><strong>핸드크림/립밤</strong> — 실용적이면서 "너를 챙긴다"는 메시지</li>
<li><strong>카페 기프트카드</strong> — "다음에 같이 가자"는 뉘앙스</li>
<li><strong>재미있는 소품</strong> — 취향 저격 굿즈, 캐릭터 아이템</li>
</ul>

<div class="highlight">마로에서 '연인 > 썸 단계'를 선택하면 부담 없으면서도 센스 있는 선물을 찾아드려요.</div>`
  }
];

const CATEGORIES = ["전체", "관계별 가이드", "시즌 특집", "선물 에티켓", "트렌드"];
let currentCat = "전체";

// ── 카테고리 탭 렌더 ──
const tabsEl = document.getElementById('catTabs');
CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-tab' + (cat === "전체" ? ' active' : '');
  btn.textContent = cat;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    renderList();
  });
  tabsEl.appendChild(btn);
});

// ── 포스트 리스트 렌더 ──
function renderList() {
  const listEl = document.getElementById('postList');
  const detailEl = document.getElementById('postDetail');
  detailEl.classList.remove('active');
  detailEl.innerHTML = '';
  listEl.style.display = 'block';

  const filtered = currentCat === "전체" ? POSTS : POSTS.filter(p => p.cat === currentCat);

  listEl.innerHTML = filtered.map(p => `
    <div class="post-card" onclick="showPost(${p.id})">
      <div class="post-meta">
        <span class="post-cat">${p.cat}</span>
        <span class="post-date">${p.date}</span>
      </div>
      <div class="post-title">${p.title}</div>
      <div class="post-excerpt">${p.excerpt}</div>
      <div class="post-tags">${p.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

// ── 포스트 상세 렌더 ──
function showPost(id) {
  const p = POSTS.find(x => x.id === id);
  if (!p) return;
  const listEl = document.getElementById('postList');
  const detailEl = document.getElementById('postDetail');
  listEl.style.display = 'none';
  detailEl.classList.add('active');
  detailEl.innerHTML = `
    <button class="back-btn" onclick="renderList()">← 목록으로</button>
    <div class="detail-meta">${p.cat} · ${p.date}</div>
    <h2 class="detail-title">${p.title}</h2>
    <div class="detail-body">${p.body}</div>
    <a href="/app" class="detail-cta">마로에서 선물 추천받기 →</a>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 초기 렌더
renderList();
</script>
</body>
</html>
