<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>단체 투표 — 마로</title>
<meta name="description" content="친구들과 함께 선물을 골라보세요. 마로 단체 투표.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --terra:#c4756e;--terra-dark:#a85e58;--terra-light:#e8ada8;--terra-pale:#fdf5f4;
  --cream:#faf6f1;--warm-gray:#6b5e57;--text:#3d2f2a;--text-light:#8a7a73;
  --card-bg:#fff;--shadow:0 2px 16px rgba(164,94,88,.10);
  --green:#6b9e78;--green-light:#e8f5eb;
}
html{font-size:16px}
body{
  font-family:'Gowun Batang',serif;background:var(--cream);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
}

.maro-header{text-align:center;padding:40px 20px 0}
.maro-logo{font-size:.85rem;letter-spacing:6px;text-transform:uppercase;color:var(--terra);font-weight:700;margin-bottom:4px}
.maro-tagline{font-size:.72rem;color:var(--text-light);letter-spacing:2px}

.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}

/* Phase nav */
.phase-nav{
  display:flex;gap:8px;margin:24px 0 28px;
}
.phase-dot{
  flex:1;height:3px;border-radius:2px;background:var(--terra-light);
  transition:background .3s;
}
.phase-dot.active{background:var(--terra)}

/* Create form */
.section-title{
  font-size:1.25rem;font-weight:700;text-align:center;margin-bottom:6px;
  line-height:1.5;
}
.section-sub{
  font-size:.82rem;color:var(--text-light);text-align:center;
  margin-bottom:24px;line-height:1.6;
}

.form-group{margin-bottom:16px}
.form-label{
  font-size:.78rem;font-weight:700;color:var(--warm-gray);
  margin-bottom:6px;display:block;
}
.form-input{
  width:100%;padding:14px 16px;border:1.5px solid #e0d5cf;border-radius:12px;
  font-family:'Gowun Batang',serif;font-size:.88rem;color:var(--text);
  background:var(--card-bg);outline:none;transition:border .2s;
}
.form-input:focus{border-color:var(--terra)}
.form-input::placeholder{color:#c4b8b0}
textarea.form-input{resize:vertical;min-height:80px}

.option-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.option-row{display:flex;gap:8px;align-items:center}
.option-row .form-input{flex:1}
.remove-btn{
  width:36px;height:36px;border-radius:10px;border:1.5px solid #e0d5cf;
  background:none;color:var(--text-light);font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.remove-btn:hover{border-color:var(--terra);color:var(--terra)}

.add-option-btn{
  width:100%;padding:12px;border:1.5px dashed var(--terra-light);
  border-radius:12px;background:none;color:var(--terra);
  font-family:'Gowun Batang',serif;font-size:.82rem;cursor:pointer;
  transition:all .2s;margin-bottom:24px;
}
.add-option-btn:hover{background:var(--terra-pale);border-color:var(--terra)}

.primary-btn{
  display:block;width:100%;padding:16px;border:none;border-radius:14px;
  background:var(--terra);color:#fff;font-family:'Gowun Batang',serif;
  font-size:.92rem;font-weight:700;letter-spacing:1px;cursor:pointer;
  transition:background .2s;
}
.primary-btn:hover{background:var(--terra-dark)}
.primary-btn:disabled{opacity:.5;cursor:not-allowed}

/* Vote phase */
.vote-card{
  background:var(--card-bg);border-radius:14px;padding:18px 20px;
  box-shadow:var(--shadow);margin-bottom:12px;cursor:pointer;
  border:2px solid transparent;transition:all .25s;
  display:flex;align-items:center;gap:14px;
}
.vote-card:hover{border-color:var(--terra-light);transform:translateY(-1px)}
.vote-card.selected{border-color:var(--terra);background:var(--terra-pale)}

.vote-radio{
  width:22px;height:22px;border-radius:50%;border:2px solid #d0c5be;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.vote-card.selected .vote-radio{border-color:var(--terra);background:var(--terra)}
.vote-card.selected .vote-radio::after{
  content:'';width:8px;height:8px;border-radius:50%;background:#fff;
}
.vote-text{font-size:.92rem;line-height:1.5}

.vote-submit{margin-top:20px}

/* Result phase */
.result-card{
  background:var(--card-bg);border-radius:14px;padding:18px 20px;
  box-shadow:var(--shadow);margin-bottom:12px;
  animation:cardIn .5s ease both;
}
.result-card:nth-child(1){animation-delay:0s}
.result-card:nth-child(2){animation-delay:.1s}
.result-card:nth-child(3){animation-delay:.2s}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.result-name{font-size:.92rem;font-weight:700}
.result-badge{
  font-size:.65rem;background:var(--terra);color:#fff;
  padding:3px 10px;border-radius:10px;font-weight:700;
}
.result-bar-wrap{
  height:8px;background:var(--terra-pale);border-radius:4px;overflow:hidden;
  margin-bottom:6px;
}
.result-bar{
  height:100%;background:var(--terra);border-radius:4px;
  transition:width .8s ease;
}
.result-stats{
  display:flex;justify-content:space-between;
  font-size:.72rem;color:var(--text-light);
}

.total-votes{
  text-align:center;font-size:.78rem;color:var(--text-light);
  margin:20px 0 16px;
}
.total-votes strong{color:var(--terra);font-size:1.1rem}

.share-row{display:flex;gap:10px;margin-top:16px}
.share-btn{
  flex:1;padding:14px;border-radius:12px;border:1.5px solid var(--terra-light);
  background:none;color:var(--terra);font-family:'Gowun Batang',serif;
  font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;
}
.share-btn:hover{background:var(--terra-pale)}
.share-btn.filled{background:var(--terra);color:#fff;border-color:var(--terra)}
.share-btn.filled:hover{background:var(--terra-dark)}

/* Realtime indicator */
.live-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--green);margin-right:6px;
  animation:livePulse 2s infinite;
}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.4}}

.firebase-notice{
  text-align:center;padding:16px;margin:20px 0;
  background:var(--terra-pale);border-radius:12px;
  font-size:.75rem;color:var(--terra-dark);line-height:1.6;
}

.hidden{display:none!important}

.maro-footer{
  text-align:center;padding:24px 20px 36px;
  border-top:1px solid rgba(196,117,110,.12);
}
.maro-footer a{
  color:var(--terra);text-decoration:none;font-size:.78rem;
  font-weight:700;letter-spacing:2px;
}
</style>
</head>
<body>

<header class="maro-header">
  <div class="maro-logo">MARO</div>
  <div class="maro-tagline">마음을 새기는 선물</div>
</header>

<div class="container">
  <!-- Phase indicator -->
  <div class="phase-nav">
    <div class="phase-dot active" id="dot1"></div>
    <div class="phase-dot" id="dot2"></div>
    <div class="phase-dot" id="dot3"></div>
  </div>

  <!-- Phase 1: Create -->
  <div id="phaseCreate">
    <h2 class="section-title">함께 골라볼까요?</h2>
    <p class="section-sub">선물 후보를 올리면 친구들이<br>투표할 수 있어요</p>

    <div class="form-group">
      <label class="form-label">투표 제목</label>
      <input class="form-input" id="voteTitle" placeholder="예: 지은이 생일 선물 뭐가 좋을까?" maxlength="60">
    </div>

    <label class="form-label">선물 후보</label>
    <div class="option-list" id="optionList">
      <div class="option-row">
        <input class="form-input" placeholder="후보 1" maxlength="40">
        <button class="remove-btn" onclick="removeOption(this)">×</button>
      </div>
      <div class="option-row">
        <input class="form-input" placeholder="후보 2" maxlength="40">
        <button class="remove-btn" onclick="removeOption(this)">×</button>
      </div>
    </div>
    <button class="add-option-btn" onclick="addOption()">+ 후보 추가</button>

    <button class="primary-btn" onclick="createVote()">투표 만들기</button>
  </div>

  <!-- Phase 2: Vote -->
  <div id="phaseVote" class="hidden">
    <h2 class="section-title" id="voteTitleDisplay"></h2>
    <p class="section-sub">마음에 드는 선물에 투표해주세요</p>
    <div id="voteCards"></div>
    <button class="primary-btn vote-submit" id="submitVoteBtn" onclick="submitVote()" disabled>투표하기</button>
  </div>

  <!-- Phase 3: Result -->
  <div id="phaseResult" class="hidden">
    <h2 class="section-title" id="resultTitle"></h2>
    <p class="section-sub"><span class="live-dot"></span>실시간 투표 결과</p>
    <div class="total-votes">총 <strong id="totalCount">0</strong>명 참여</div>
    <div id="resultCards"></div>
    <div class="share-row">
      <button class="share-btn" onclick="copyLink()">🔗 링크 복사</button>
      <button class="share-btn filled" onclick="shareKakao()">카카오 공유</button>
    </div>
    <div style="margin-top:12px">
      <button class="share-btn" style="width:100%" onclick="goToCreate()">새 투표 만들기</button>
    </div>
  </div>

  <!-- Firebase 안내 -->
  <div class="firebase-notice" id="fbNotice" style="display:none">
    ⚠️ Firebase가 연결되지 않았어요.<br>
    로컬 모드로 작동합니다. (공유 투표 불가)
  </div>
</div>

<footer class="maro-footer">
  <a href="index.html">MARO</a>
</footer>

<!-- Firebase SDK (v9 compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ══════════════════════════════════════
// 🔥 Firebase 설정 — 여기에 본인 config 넣기
// ══════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA8ncGXGCAHZvIlYtVRaTaJhtUN3RvBYrw",
  authDomain: "maro-app-bf4a6.firebaseapp.com",
  projectId: "maro-app-bf4a6",
  storageBucket: "maro-app-bf4a6.firebasestorage.app",
  messagingSenderId: "558506073929",
  appId: "1:558506073929:web:1f496d8a03c6951b8c0498",
  measurementId: "G-S3Y94YY9WP"
};

let db = null;
let useFirebase = false;
let unsubscribe = null;

// Firebase 초기화 시도
try {
  if (FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    useFirebase = true;
  } else {
    document.getElementById('fbNotice').style.display = 'block';
  }
} catch (e) {
  console.warn('Firebase 초기화 실패, 로컬 모드:', e);
  document.getElementById('fbNotice').style.display = 'block';
}

// ── 상태 ──
let currentVoteId = null;
let selectedOption = null;
let localVotes = {};
let hasVoted = false;

// ── URL에서 투표 ID 확인 ──
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const vid = params.get('v');
  if (vid) {
    currentVoteId = vid;
    loadVote(vid);
  }
});

// ── Phase 전환 ──
function showPhase(n) {
  document.getElementById('phaseCreate').classList.toggle('hidden', n !== 1);
  document.getElementById('phaseVote').classList.toggle('hidden', n !== 2);
  document.getElementById('phaseResult').classList.toggle('hidden', n !== 3);
  document.getElementById('dot1').classList.toggle('active', n >= 1);
  document.getElementById('dot2').classList.toggle('active', n >= 2);
  document.getElementById('dot3').classList.toggle('active', n >= 3);
}

// ── 후보 추가/삭제 ──
function addOption() {
  const list = document.getElementById('optionList');
  if (list.children.length >= 6) return;
  const n = list.children.length + 1;
  const row = document.createElement('div');
  row.className = 'option-row';
  row.innerHTML = `
    <input class="form-input" placeholder="후보 ${n}" maxlength="40">
    <button class="remove-btn" onclick="removeOption(this)">×</button>
  `;
  list.appendChild(row);
}

function removeOption(btn) {
  const list = document.getElementById('optionList');
  if (list.children.length <= 2) return;
  btn.parentElement.remove();
}

// ── 투표 생성 ──
async function createVote() {
  const title = document.getElementById('voteTitle').value.trim();
  if (!title) { alert('투표 제목을 입력해주세요'); return; }

  const inputs = document.querySelectorAll('#optionList input');
  const options = [];
  inputs.forEach(inp => {
    const v = inp.value.trim();
    if (v) options.push(v);
  });
  if (options.length < 2) { alert('후보를 2개 이상 입력해주세요'); return; }

  const voteData = {
    title,
    options: options.map(o => ({ name: o, count: 0 })),
    totalVotes: 0,
    createdAt: new Date().toISOString()
  };

  if (useFirebase) {
    try {
      const ref = await db.collection('votes').add(voteData);
      currentVoteId = ref.id;
      // URL 업데이트
      const url = new URL(window.location);
      url.searchParams.set('v', currentVoteId);
      window.history.pushState({}, '', url);
    } catch (e) {
      console.error('Firebase 저장 실패:', e);
      // 로컬 폴백
      currentVoteId = 'local_' + Date.now();
      localVotes[currentVoteId] = voteData;
    }
  } else {
    currentVoteId = 'local_' + Date.now();
    localVotes[currentVoteId] = voteData;
    const url = new URL(window.location);
    url.searchParams.set('v', currentVoteId);
    window.history.pushState({}, '', url);
  }

  renderVotePhase(voteData);
  showPhase(2);
}

// ── 투표 불러오기 ──
async function loadVote(vid) {
  if (useFirebase) {
    try {
      const doc = await db.collection('votes').doc(vid).get();
      if (doc.exists) {
        const data = doc.data();
        // 이미 투표한 사람인지 체크
        const votedKey = 'maro_voted_' + vid;
        hasVoted = localStorage.getItem(votedKey) === 'true';

        if (hasVoted) {
          renderResultPhase(data);
          showPhase(3);
          listenResults(vid);
        } else {
          renderVotePhase(data);
          showPhase(2);
        }
      } else {
        alert('존재하지 않는 투표입니다');
      }
    } catch (e) {
      console.error('투표 로드 실패:', e);
    }
  } else {
    // 로컬 모드에서는 투표 공유 불가
    document.getElementById('fbNotice').style.display = 'block';
  }
}

// ── 투표 화면 렌더 ──
function renderVotePhase(data) {
  document.getElementById('voteTitleDisplay').textContent = data.title;
  const container = document.getElementById('voteCards');
  container.innerHTML = '';
  selectedOption = null;

  data.options.forEach((opt, i) => {
    const card = document.createElement('div');
    card.className = 'vote-card';
    card.innerHTML = `
      <div class="vote-radio"></div>
      <div class="vote-text">${opt.name}</div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.vote-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedOption = i;
      document.getElementById('submitVoteBtn').disabled = false;
    });
    container.appendChild(card);
  });
}

// ── 투표 제출 ──
async function submitVote() {
  if (selectedOption === null) return;

  if (useFirebase) {
    try {
      const ref = db.collection('votes').doc(currentVoteId);
      await db.runTransaction(async (tx) => {
        const doc = await tx.get(ref);
        if (!doc.exists) throw new Error('투표 없음');
        const data = doc.data();
        data.options[selectedOption].count += 1;
        data.totalVotes += 1;
        tx.update(ref, data);
      });

      // 투표 완료 표시
      localStorage.setItem('maro_voted_' + currentVoteId, 'true');
      hasVoted = true;

      // 결과 로드 + 실시간 리스너
      const doc = await ref.get();
      renderResultPhase(doc.data());
      showPhase(3);
      listenResults(currentVoteId);

    } catch (e) {
      console.error('투표 실패:', e);
      alert('투표에 실패했어요. 다시 시도해주세요.');
    }
  } else {
    // 로컬 모드
    const data = localVotes[currentVoteId];
    if (data) {
      data.options[selectedOption].count += 1;
      data.totalVotes += 1;
      renderResultPhase(data);
      showPhase(3);
    }
  }
}

// ── 실시간 결과 리스너 ──
function listenResults(vid) {
  if (!useFirebase || unsubscribe) return;
  unsubscribe = db.collection('votes').doc(vid).onSnapshot(doc => {
    if (doc.exists) {
      renderResultPhase(doc.data());
    }
  });
}

// ── 결과 화면 렌더 ──
function renderResultPhase(data) {
  document.getElementById('resultTitle').textContent = data.title;
  document.getElementById('totalCount').textContent = data.totalVotes;

  const container = document.getElementById('resultCards');
  container.innerHTML = '';

  // 정렬 (높은 순)
  const sorted = data.options
    .map((o, i) => ({ ...o, idx: i }))
    .sort((a, b) => b.count - a.count);

  const maxCount = sorted[0]?.count || 1;

  sorted.forEach((opt, rank) => {
    const pct = data.totalVotes > 0 ? Math.round(opt.count / data.totalVotes * 100) : 0;
    const barWidth = maxCount > 0 ? Math.round(opt.count / maxCount * 100) : 0;

    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-header">
        <span class="result-name">${rank === 0 ? '👑 ' : ''}${opt.name}</span>
        ${rank === 0 && data.totalVotes > 0 ? '<span class="result-badge">1위</span>' : ''}
      </div>
      <div class="result-bar-wrap">
        <div class="result-bar" style="width:0%"></div>
      </div>
      <div class="result-stats">
        <span>${opt.count}표</span>
        <span>${pct}%</span>
      </div>
    `;
    container.appendChild(card);

    // 바 애니메이션
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        card.querySelector('.result-bar').style.width = barWidth + '%';
      });
    });
  });
}

// ── 공유 ──
function copyLink() {
  const url = window.location.origin + window.location.pathname + '?v=' + currentVoteId;
  navigator.clipboard.writeText(url).then(() => {
    const btn = event.target;
    btn.textContent = '✅ 복사 완료!';
    setTimeout(() => { btn.textContent = '🔗 링크 복사'; }, 2000);
  }).catch(() => {
    // 폴백
    prompt('이 링크를 복사해주세요:', url);
  });
}

function shareKakao() {
  const url = window.location.origin + window.location.pathname + '?v=' + currentVoteId;
  const title = document.getElementById('resultTitle').textContent;
  if (typeof Kakao !== 'undefined' && Kakao.isInitialized()) {
    Kakao.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: '마로 — ' + title,
        description: '함께 투표해주세요!',
        imageUrl: window.location.origin + '/og-image.png',
        link: { mobileWebUrl: url, webUrl: url }
      },
      buttons: [{ title: '투표 참여하기', link: { mobileWebUrl: url, webUrl: url } }]
    });
  } else {
    // 카카오 SDK 없으면 일반 공유
    const shareUrl = `https://story.kakao.com/share?url=${encodeURIComponent(url)}`;
    window.open(shareUrl, '_blank');
  }
}

function goToCreate() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  currentVoteId = null;
  selectedOption = null;
  hasVoted = false;
  document.getElementById('voteTitle').value = '';
  const list = document.getElementById('optionList');
  list.innerHTML = `
    <div class="option-row"><input class="form-input" placeholder="후보 1" maxlength="40"><button class="remove-btn" onclick="removeOption(this)">×</button></div>
    <div class="option-row"><input class="form-input" placeholder="후보 2" maxlength="40"><button class="remove-btn" onclick="removeOption(this)">×</button></div>
  `;
  window.history.pushState({}, '', window.location.pathname);
  showPhase(1);
}
</script>
</body>
</html>
