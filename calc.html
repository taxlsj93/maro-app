<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선물비 정산 계산기 — 마로</title>
<meta name="description" content="선물 비용을 간편하게 나눠보세요. 토스, 카카오페이 송금 링크까지.">
<meta property="og:title" content="선물비 정산 계산기 — 마로">
<meta property="og:description" content="선물 비용을 간편하게 나눠보세요.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://maro.ai.kr/og-image.png">
<meta property="og:url" content="https://maro.ai.kr/calc">
<link rel="canonical" href="https://maro.ai.kr/calc">
<meta name="theme-color" content="#c4756e">
<meta name="naver-site-verification" content="512743715781180ed71c3547ce74195b3dca12ed">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-S3Y94YY9WP"></script>

<script>(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window,document,"clarity","script","wa4igxovn5");</script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,'Helvetica Neue','Segoe UI','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:linear-gradient(160deg,#faf8f4,#f5f0e8,#f0ebe0);min-height:100vh;color:#2d2420}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState} = React;
const P="#c4756e",P2="#a85e58";

function App(){
  const[total,setTotal]=useState("");
  const[people,setPeople]=useState("");
  const[organizer,setOrganizer]=useState("");
  const[orgExtra,setOrgExtra]=useState(0);
  const[showResult,setShowResult]=useState(false);
  const[copied,setCopied]=useState(false);

  const num=parseInt(people)||0;
  const amt=parseInt(total.replace(/,/g,""))||0;
  const extra=parseInt(orgExtra)||0;

  // 총무가 더 낸 경우 계산
  const orgPay=num>0?Math.ceil(amt/num)+extra:0;
  const perPerson=num>0?Math.ceil(amt/num):0;
  const othersEach=num>1?Math.ceil((amt-orgPay)/(num-1)):0;

  const calc=()=>{if(amt>0&&num>=2)setShowResult(true);};

  const formatNum=(n)=>n.toLocaleString("ko-KR");

  // 정산 메시지 생성
  const msg=`🎁 선물비 정산 안내\n\n총 금액: ${formatNum(amt)}원\n참여 인원: ${num}명\n1인당: ${formatNum(perPerson)}원\n${organizer?`\n💰 ${organizer}에게 ${formatNum(perPerson)}원 보내주세요!`:""}`;

  const copyMsg=()=>{navigator.clipboard?.writeText(msg);setCopied(true);setTimeout(()=>setCopied(false),2000);};

  // 토스 송금 딥링크 (금액만 포함, 계좌는 사용자가 직접)
  const tossLink=`supertoss://send?amount=${perPerson}`;
  const kakaoLink=`https://qr.kakaopay.com/`;

  const s={input:{width:"100%",padding:"14px 16px",border:"1.5px solid #e6dfd4",borderRadius:12,fontSize:16,color:"#2d2420",background:"#fff",outline:"none",textAlign:"center"}};

  return(
    <div style={{maxWidth:460,margin:"0 auto",padding:"20px 20px 40px",minHeight:"100vh"}}>
      <div style={{textAlign:"center",padding:"24px 0 20px"}}>
        <a href="/" style={{textDecoration:"none",display:"inline-flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${P},${P2})`,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:13}}>♥</span></div>
          <span style={{fontSize:18,fontWeight:700,color:"#2d2420"}}>마로</span>
        </a>
        <h1 style={{fontFamily:"'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:22,fontWeight:700,marginBottom:6}}>선물비 정산 계산기</h1>
        <p style={{fontSize:13,color:"#9a8a7a"}}>1/N 계산하고 송금 링크까지 한 번에</p>
      </div>

      {!showResult?(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:"#5a4a3a",marginBottom:6,display:"block"}}>💰 선물 총 금액 (원)</label>
            <input value={total} onChange={e=>setTotal(e.target.value.replace(/[^0-9]/g,""))} placeholder="예) 150000" style={s.input} inputMode="numeric"/>
            {amt>0&&<div style={{textAlign:"center",fontSize:12,color:P,marginTop:4,fontWeight:600}}>{formatNum(amt)}원</div>}
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:"#5a4a3a",marginBottom:6,display:"block"}}>👥 참여 인원 수</label>
            <div style={{display:"flex",alignItems:"center",gap:12,justifyContent:"center"}}>
              <button onClick={()=>setPeople(String(Math.max(2,(parseInt(people)||2)-1)))} style={{width:44,height:44,borderRadius:12,border:"1.5px solid #e6dfd4",background:"#fff",fontSize:20,cursor:"pointer",color:"#5a4a3a"}}>−</button>
              <input value={people} onChange={e=>setPeople(e.target.value.replace(/[^0-9]/g,""))} placeholder="2" style={{...s.input,width:80,fontSize:24,fontWeight:700}} inputMode="numeric"/>
              <button onClick={()=>setPeople(String(Math.min(50,(parseInt(people)||2)+1)))} style={{width:44,height:44,borderRadius:12,border:"1.5px solid #e6dfd4",background:"#fff",fontSize:20,cursor:"pointer",color:"#5a4a3a"}}>+</button>
            </div>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:"#5a4a3a",marginBottom:6,display:"block"}}>🙋 총무(돈 받을 사람) 이름 (선택)</label>
            <input value={organizer} onChange={e=>setOrganizer(e.target.value)} placeholder="예) 민수" style={{...s.input,fontSize:14}}/>
          </div>

          {amt>0&&num>=2&&(
            <div style={{background:"rgba(255,255,255,.85)",border:`2px solid ${P}`,borderRadius:16,padding:20,textAlign:"center",animation:"up .3s ease both",marginTop:8}}>
              <div style={{fontSize:12,color:P,fontWeight:600,letterSpacing:1,marginBottom:8}}>1인당 금액</div>
              <div style={{fontFamily:"'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:36,fontWeight:700,color:"#2d2420"}}>{formatNum(perPerson)}<span style={{fontSize:16,fontWeight:400}}>원</span></div>
              <div style={{fontSize:12,color:"#9a8a7a",marginTop:4}}>{formatNum(amt)}원 ÷ {num}명</div>
            </div>
          )}

          <button onClick={calc} disabled={amt<=0||num<2} style={{width:"100%",padding:15,background:(amt<=0||num<2)?"#ccc":`linear-gradient(135deg,${P},${P2})`,color:"#fff",border:"none",borderRadius:14,fontSize:15,fontWeight:600,cursor:(amt<=0||num<2)?"not-allowed":"pointer",boxShadow:`0 6px 24px ${P}30`,marginTop:8}}>정산 메시지 만들기 📨</button>
        </div>
      ):(
        <div>
          {/* Result card */}
          <div style={{background:"rgba(255,255,255,.92)",border:`2px solid ${P}`,borderRadius:18,padding:24,textAlign:"center",marginBottom:20,animation:"up .3s ease both"}}>
            <div style={{fontSize:12,color:P,fontWeight:700,letterSpacing:2,marginBottom:12}}>정산 결과</div>
            <div style={{fontFamily:"'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:42,fontWeight:700,color:"#2d2420",marginBottom:4}}>
              {formatNum(perPerson)}<span style={{fontSize:18,fontWeight:400}}>원</span>
            </div>
            <div style={{fontSize:13,color:"#9a8a7a",marginBottom:16}}>
              총 {formatNum(amt)}원 ÷ {num}명
            </div>
            {organizer&&(
              <div style={{background:`${P}08`,borderRadius:10,padding:"10px 16px",fontSize:13,color:"#5a4a3a"}}>
                💰 <strong>{organizer}</strong>에게 <strong style={{color:P}}>{formatNum(perPerson)}원</strong> 보내주세요!
              </div>
            )}
          </div>

          {/* 정산 메시지 */}
          <div style={{background:"#fff",border:"1.5px solid #ebe4dc",borderRadius:14,padding:16,marginBottom:12,whiteSpace:"pre-wrap",fontSize:13,color:"#5a4a3a",lineHeight:1.7}}>{msg}</div>

          <button onClick={copyMsg} style={{width:"100%",padding:13,background:copied?`${P}15`:"rgba(255,255,255,.8)",border:`1.5px solid ${copied?P:"#e6dfd4"}`,borderRadius:12,fontSize:13,color:copied?P:"#5a4a3a",fontWeight:600,cursor:"pointer",marginBottom:10}}>
            {copied?"✅ 복사됨!":"📋 정산 메시지 복사 (카톡에 붙여넣기)"}
          </button>

          {/* 송금 링크들 */}
          <div style={{fontSize:12,fontWeight:600,color:"#5a4a3a",marginBottom:8,marginTop:16}}>💸 바로 송금하기</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <a href={tossLink} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:14,background:"#0064FF",color:"#fff",borderRadius:12,fontSize:14,fontWeight:600,textDecoration:"none"}}>
              토스로 보내기
            </a>
            <a href={kakaoLink} target="_blank" rel="noopener" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:14,background:"#FEE500",color:"#3C1E1E",borderRadius:12,fontSize:14,fontWeight:600,textDecoration:"none"}}>
              카카오페이
            </a>
          </div>
          <p style={{fontSize:11,color:"#c8b8a8",textAlign:"center",marginBottom:16}}>* 토스 앱이 설치된 모바일에서만 작동해요</p>

          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowResult(false)} style={{flex:1,padding:12,background:"rgba(255,255,255,.7)",border:"1.5px solid #e6dfd4",borderRadius:12,fontSize:13,color:"#5a4a3a",fontWeight:600,cursor:"pointer"}}>← 다시 계산</button>
            <a href="/app" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:12,background:`linear-gradient(135deg,${P},${P2})`,color:"#fff",borderRadius:12,fontSize:13,fontWeight:600,textDecoration:"none"}}>🎁 선물 추천받기</a>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",marginTop:32,fontSize:10,color:"#c8b8a8"}}>© 2025 마로 · 마음을 새기는 선물</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<footer style="text-align:center;padding:16px;font-size:11px;color:#a09585;line-height:1.7">
  <a href="/" style="color:#a09585;text-decoration:none;font-weight:600">MARO</a>
  <div style="margin-top:4px"><a href="/privacy" style="color:#a09585">개인정보처리방침</a> · <a href="/terms" style="color:#a09585">이용약관</a></div>
</footer>
</body>
</html>
