      style={{...style,transform:d?"scale(0.94)":ok?"scale(0.97)":"scale(1)",transition:d?"transform .06s":"all .2s cubic-bezier(.2,0,.2,1)",outline:"none",WebkitTapHighlightColor:"transparent",userSelect:"none",position:"relative",overflow:"hidden",...(ok?{borderColor:P,background:`${P}10`,boxShadow:`0 0 0 3px ${P}18`}:{})}}>
      {children}
      {ok&&<div style={{position:"absolute",top:7,right:7,width:22,height:22,borderRadius:"50%",background:`linear-gradient(135deg,${P},${P2})`,display:"flex",alignItems:"center",justifyContent:"center",animation:"pop .18s cubic-bezier(.34,1.56,.64,1)"}}><span style={{color:"#fff",fontSize:12,fontWeight:800}}>✓</span></div>}
    </button>
  );
}

function SH({n,title,sub,onBack}){
  return(
    <div style={{marginBottom:20}}>
      {onBack&&<button onClick={onBack} style={{display:"inline-flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",fontSize:13,color:TX3,padding:"4px 0",marginBottom:10,transition:"color .15s"}} onPointerDown={e=>e.currentTarget.style.color=TX2} onPointerUp={e=>e.currentTarget.style.color=TX3}>← 이전으로</button>}
      <div style={{fontSize:11,color:P,fontWeight:700,letterSpacing:2,marginBottom:6}}>STEP {n}</div>
      <h2 style={{fontSize:19,fontWeight:600,color:TX,margin:"0 0 5px",lineHeight:1.4}}>{title}</h2>
      <p style={{fontSize:13,color:TX3,margin:0}}>{sub}</p>
    </div>
  );
}

function App(){
  const[step,setStep]=useState(0);const[rel,setRel]=useState(null);const[dep,setDep]=useState("");
  const[occ,setOcc]=useState(null);const[bud,setBud]=useState(null);const[intent,setIntent]=useState("");
  const[tags,setTags]=useState([]);const[results,setResults]=useState([]);const[loading,setLoading]=useState(false);
  const[lm,setLm]=useState(0);const[fade,setFade]=useState(true);const box=useRef(null);

  const LM=["관계를 분석하고 있어요...","의도에 맞는 선물을 찾고 있어요...","감정 메시지를 해석하고 있어요...","최적의 선물을 선별하고 있어요..."];
  useEffect(()=>{if(!loading)return;const i=setInterval(()=>setLm(p=>(p+1)%LM.length),2000);return()=>clearInterval(i);},[loading]);
  const go=n=>{setFade(false);setTimeout(()=>{setStep(n);setFade(true);box.current?.scrollTo({top:0,behavior:"smooth"});},280);};
  const toggleTag=id=>setTags(p=>p.includes(id)?p.filter(x=>x!==id):p.length<5?[...p,id]:p);
  const tagLabels=tags.map(id=>TAGS.find(t=>t.id===id)?.label).filter(Boolean);
  const anaText=rel&&occ?`${rel.label}${dep?` (${dep})`:""}에게 ${occ.label} 상황에서`:"";

  const analyze=async()=>{
    setLoading(true);go(6);
    const tagLine=tagLabels.length>0?`\n이 사람 관심사/취향: ${tagLabels.join(", ")}`:"";
    const prompt=`당신은 한국의 관계 문화를 깊이 이해하는 선물 추천 전문가입니다.\n관계: ${rel?.label}, 깊이: ${dep||"미지정"}, 상황: ${occ?.label}, 예산: ${bud?.label}\n전하고 싶은 마음: "${intent||"특별한 메시지 없음"}"${tagLine}\n규칙: 1)${occ?.label} 상황에 맞는 선물만 2)관계 깊이 고려 3)한국 문화 부적절 선물 제외 4)searchKeyword는 쿠팡 검색 키워드${tagLabels.length>0?" 5)관심사/취향을 적극 반영":""}\nJSON만 출력: {"gifts":[{"name":"상품명","price":"가격대","reason":"2문장 설명","emoji":"이모지","searchKeyword":"쿠팡키워드"},{"name":"...","price":"...","reason":"...","emoji":"...","searchKeyword":"..."},{"name":"...","price":"...","reason":"...","emoji":"...","searchKeyword":"..."}]}`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-opus-4-5",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      if(!r.ok)throw 0;
      const d=await r.json();const t=d.content?.[0]?.text||"";const m=t.match(/\{[\s\S]*\}/);
      if(!m)throw 0;const p=JSON.parse(m[0]);if(!p.gifts?.length)throw 0;setResults(p.gifts);
    }catch{setResults(gfb(occ?.id,bud?.id));}
    setLoading(false);
  };

  const restart=()=>{setRel(null);setDep("");setOcc(null);setBud(null);setIntent("");setTags([]);setResults([]);setLoading(false);go(0);};
  const prog=Math.min(step,5);

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#faf8f4 0%,#f5f0e8 30%,#faf6ef 60%,#f0ebe0 100%)",fontFamily:"'Noto Sans KR','Apple SD Gothic Neo',-apple-system,sans-serif",color:TX}}>
      {/* 헤더 */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(250,248,244,.92)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(232,223,212,.5)",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <a href="/" style={{display:"flex",alignItems:"center",gap:8,textDecoration:"none"}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${P},${P2})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontFamily:"'Gowun Batang',serif",fontWeight:700}}>마</div>
          <span style={{fontFamily:"'Gowun Batang',serif",fontSize:16,fontWeight:700,color:P2}}>마로</span>
        </a>
        <span style={{fontSize:11,color:TX3,letterSpacing:1}}>마음을 새기는 선물</span>
      </div>

      <div ref={box} style={{maxWidth:480,margin:"0 auto",padding:"20px 20px 40px",minHeight:"calc(100vh - 53px)"}}>
        <div style={{textAlign:"center",padding:"24px 0 12px"}}>
          <div style={{fontSize:11,letterSpacing:4,color:"#b0a48e",textTransform:"uppercase",marginBottom:8}}>Relationship Intent Engine</div>
          <h1 style={{fontFamily:"'Gowun Batang',serif",fontSize:20,fontWeight:600,color:TX,margin:0,lineHeight:1.4}}>AI가 분석하는<br/>관계 중심 선물 추천</h1>
        </div>

        {step>=1&&step<=6&&(
          <div style={{margin:"14px 0 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              {["관계","깊이","상황","예산","마음"].map((l,i)=>(
                <span key={i} onClick={()=>{if(i<prog)go(i+1)}} style={{fontSize:10,color:i<prog?TX2:TX3,fontWeight:i<prog?600:400,cursor:i<prog?"pointer":"default",textDecoration:i<prog?"underline":"none",textUnderlineOffset:3}}>{l}</span>
              ))}
            </div>
            <div style={{height:3,background:"#e6dfd4",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${(prog/5)*100}%`,background:`linear-gradient(90deg,${P},${P2})`,borderRadius:2,transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
            </div>
          </div>
        )}

        <div style={{opacity:fade?1:0,transform:fade?"translateY(0)":"translateY(12px)",transition:"all .28s ease"}}>
          {step===0&&(
            <div style={{textAlign:"center",padding:"40px 0"}}>
              <div style={{fontSize:52,marginBottom:20}}>🎁</div>
              <h2 style={{fontFamily:"'Gowun Batang',serif",fontSize:20,fontWeight:600,color:TX,marginBottom:10}}>어떤 마음을 전하고 싶으세요?</h2>
              <p style={{fontSize:14,color:TX3,lineHeight:1.7,marginBottom:36}}>선물이 아니라, 관계에서 전하고 싶은<br/>마음을 먼저 정리해드릴게요.</p>
              <Btn onClick={()=>go(1)} ms={280} style={{background:`linear-gradient(135deg,${TX},#6b5d4a)`,color:"#f5f0e8",border:"none",borderRadius:14,padding:"16px 48px",fontSize:15,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 20px rgba(74,63,48,.2)"}}>시작하기</Btn>
              <p style={{fontSize:11,color:"#c0b5a4",marginTop:20}}>약 30초면 완료돼요</p>
            </div>
          )}
          {step===1&&(
            <div>
              <SH n="01" title="누구에게 선물하나요?" sub="관계에 따라 적절한 선물이 달라져요" onBack={()=>go(0)}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {RELATIONS.map(r=>(
                  <Btn key={r.id} onClick={()=>{setRel(r);go(2)}} style={{...card,padding:"16px 12px"}}>
                    <span style={{fontSize:24}}>{r.icon}</span>
                    <div style={{fontSize:14,fontWeight:600,color:TX,marginTop:6}}>{r.label}</div>
                    <div style={{fontSize:11,color:TX3,marginTop:2}}>{r.desc}</div>
                  </Btn>
                ))}
              </div>
            </div>
          )}
          {step===2&&(
            <div>
              <SH n="02" title={`${rel?.icon} ${rel?.label}과의 관계 깊이는?`} sub="관계의 깊이에 따라 선물의 무게감이 달라져요" onBack={()=>go(1)}/>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {(rel?.depth||[]).map((d,i)=>(
                  <Btn key={i} onClick={()=>{setDep(d);go(3)}} style={{...card,padding:"14px 18px",fontSize:14,color:TX,fontWeight:500}}>
                    <span style={{marginRight:10,opacity:.4,fontWeight:700}}>{i+1}</span>{d}
                  </Btn>
                ))}
              </div>
            </div>
          )}
          {step===3&&(
            <div>
              <SH n="03" title="어떤 상황인가요?" sub="상황에 따라 선물의 의미가 완전히 달라져요" onBack={()=>go(2)}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {OCCASIONS.map(o=>(
                  <Btn key={o.id} onClick={()=>{setOcc(o);go(4)}} style={{...card,padding:"14px 12px",textAlign:"center"}}>
                    <span style={{fontSize:22}}>{o.icon}</span>
                    <div style={{fontSize:13,fontWeight:600,color:TX,marginTop:5}}>{o.label}</div>
                  </Btn>
                ))}
              </div>
            </div>
          )}
          {step===4&&(
            <div>
              <SH n="04" title="예산은 얼마 정도 생각하세요?" sub="예산에 맞는 최적의 선물을 찾아드릴게요" onBack={()=>go(3)}/>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {BUDGETS.map(b=>(
                  <Btn key={b.id} onClick={()=>{setBud(b);go(5)}} style={{...card,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:14,fontWeight:600,color:TX}}>{b.label}</span>
                    <span style={{fontSize:11,color:P,background:`${P}10`,padding:"3px 10px",borderRadius:20,fontWeight:500}}>{b.tag}</span>
                  </Btn>
                ))}
              </div>
            </div>
          )}
          {step===5&&!loading&&results.length===0&&(
            <div>
              <SH n="05" title="어떤 마음을 전하고 싶으세요?" sub="이 한마디가 선물의 방향을 결정해요 (선택)" onBack={()=>go(4)}/>
              <textarea value={intent} onChange={e=>setIntent(e.target.value)} placeholder="예) 항상 곁에 있어줘서 고마워..."
                style={{width:"100%",minHeight:80,background:"rgba(255,255,255,.8)",border:"1.5px solid #e6dfd4",borderRadius:12,padding:"14px 16px",fontSize:14,color:TX,resize:"none",outline:"none",fontFamily:"inherit",lineHeight:1.6,boxSizing:"border-box",transition:"border-color .2s"}}
                onFocus={e=>e.target.style.borderColor=P} onBlur={e=>e.target.style.borderColor="#e6dfd4"}/>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,margin:"10px 0 20px"}}>
                {(INTENT_HINTS[rel?.id]||INTENT_HINTS.friend).map((s,i)=>(
                  <button key={i} onClick={()=>setIntent(s)} style={{background:intent===s?`${P}20`:"rgba(255,255,255,.6)",border:`1px solid ${intent===s?P:"#e2dbd0"}`,borderRadius:20,padding:"5px 13px",fontSize:12,color:intent===s?P:TX3,cursor:"pointer",transition:"all .15s",fontWeight:intent===s?600:400}}>{s}</button>
                ))}
              </div>
              <div style={{marginBottom:18}}>
                <div style={{fontSize:12,fontWeight:600,color:TX2,marginBottom:8}}>🔍 이 사람 관심사 <span style={{fontWeight:400,color:TX3}}>(선택, 최대 5개)</span></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {TAGS.map(t=>{const on=tags.includes(t.id);return(
                    <button key={t.id} onClick={()=>toggleTag(t.id)} style={{background:on?`${P}14`:"rgba(255,255,255,.6)",border:`1px solid ${on?P:"#e2dbd0"}`,borderRadius:20,padding:"4px 11px",fontSize:11,color:on?P:TX3,cursor:"pointer",transition:"all .15s",fontWeight:on?600:400}}>{t.em} {t.label}</button>
                  );})}
                </div>
                {tags.length>0&&<div style={{fontSize:11,color:P,marginTop:6}}>{tags.length}개 선택됨</div>}
              </div>
              <div style={{background:"rgba(255,255,255,.6)",border:"1px solid #e6dfd4",borderRadius:12,padding:"12px 16px",marginBottom:18}}>
                <div style={{fontSize:11,color:P,fontWeight:600,marginBottom:6,letterSpacing:1}}>분석 요약</div>
                <div style={{fontSize:13,color:TX2,lineHeight:1.7}}>{rel?.icon} {rel?.label} ({dep}) · {occ?.icon} {occ?.label} · {bud?.label}</div>
              </div>
              <Btn onClick={analyze} ms={300} style={{width:"100%",background:`linear-gradient(135deg,${TX},#6b5d4a)`,color:"#f5f0e8",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 20px rgba(74,63,48,.2)"}}>AI 분석 시작하기 ✨</Btn>
              <button onClick={()=>{setIntent("");analyze();}} style={{width:"100%",background:"transparent",border:"none",color:TX3,fontSize:13,padding:12,cursor:"pointer",marginTop:4}}>건너뛰기 — AI가 알아서 판단할게요</button>
            </div>
          )}
          {loading&&(
            <div style={{textAlign:"center",padding:"60px 0"}}>
              <div style={{width:56,height:56,margin:"0 auto 24px",border:"3px solid #e6dfd4",borderTop:`3px solid ${P}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
              <p style={{fontSize:15,color:TX2,fontWeight:500,marginBottom:6}}>{LM[lm]}</p>
              <p style={{fontSize:12,color:TX3}}>{anaText} 최적의 선물을 찾고 있어요</p>
            </div>
          )}
          {!loading&&results.length>0&&(
            <div>
              <div style={{background:`linear-gradient(135deg,${P}08,${P}0c)`,borderRadius:16,padding:20,marginBottom:18,border:`1px solid ${P}18`}}>
                <div style={{fontSize:11,letterSpacing:2,color:P,fontWeight:700,marginBottom:8}}>AI 분석 완료</div>
                <div style={{fontSize:15,color:TX,fontWeight:600,lineHeight:1.6,marginBottom:4}}>{anaText}</div>
                {intent&&<div style={{fontSize:13,color:TX2,fontStyle:"italic"}}>"{intent}"</div>}
                <div style={{fontSize:12,color:TX3,marginTop:6}}>예산 {bud?.label} · {bud?.tag} 선물</div>
                {tagLabels.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>{tagLabels.map((l,i)=><span key={i} style={{fontSize:11,background:`${P}10`,color:P2,padding:"2px 8px",borderRadius:10}}>{l}</span>)}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {results.map((g,i)=>{
                  const sk=g.searchKeyword||g.sk||g.name;
                  const url=mkUrl(sk,g.price);
                  return(
                    <div key={i} style={{background:"rgba(255,255,255,.9)",border:i===0?`2px solid ${P}`:"1.5px solid #e6dfd4",borderRadius:18,padding:20,position:"relative",overflow:"hidden",animation:`up .4s ease ${i*.15}s both`}}>
                      {i===0&&<div style={{position:"absolute",top:14,right:14,background:`linear-gradient(135deg,${P},${P2})`,color:"#fff",fontSize:10,fontWeight:700,padding:"4px 12px",borderRadius:20,letterSpacing:.5}}>BEST PICK</div>}
                      <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                        <div style={{width:64,height:64,borderRadius:14,flexShrink:0,background:`${P}10`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>{g.emoji||"🎁"}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:15,fontWeight:700,color:TX,marginBottom:4,lineHeight:1.3}}>{g.name}</div>
                          <div style={{display:"inline-block",fontSize:12,color:P,fontWeight:700,background:`${P}0c`,padding:"2px 10px",borderRadius:6,marginBottom:8}}>{g.price}</div>
                          <div style={{fontSize:13,color:TX2,lineHeight:1.7}}>{g.reason}</div>
                        </div>
                      </div>
                      <a href={url} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:12,padding:"9px 14px",background:`${P}06`,border:`1px solid ${P}18`,borderRadius:10,textDecoration:"none",fontSize:13,color:TX2,fontWeight:600,transition:"all .15s"}}>
                        🔍 상품 예시 보기 <span style={{fontSize:11,color:TX3,fontWeight:400}}>쿠팡</span><span style={{fontSize:12,marginLeft:"auto",color:P}}>→</span>
                      </a>
                    </div>
                  );
                })}
              </div>
              <div style={{background:`${P}06`,border:`1px dashed ${P}25`,borderRadius:12,padding:"12px 16px",marginTop:16}}>
                <div style={{fontSize:12,color:"#6a5a4a",lineHeight:1.7}}>💡 <strong>TIP</strong> — 선물과 함께 짧은 손편지를 곁들이면 마음이 더 잘 전달돼요.{intent&&` "${intent}" 이 마음을 직접 적어보는 건 어떨까요?`}</div>
              </div>
              <div style={{background:"rgba(0,0,0,.03)",border:"1px solid rgba(0,0,0,.07)",borderRadius:10,padding:"10px 14px",marginTop:10}}>
                <div style={{fontSize:11,color:TX3,lineHeight:1.7}}>📢 위 상품 링크는 <strong>쿠팡 파트너스</strong> 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>
              </div>
              <div style={{marginTop:22,display:"flex",gap:10}}>
                <Btn onClick={restart} style={{flex:1,background:"rgba(255,255,255,.75)",border:"1.5px solid #e6dfd4",borderRadius:12,padding:13,fontSize:13,color:TX2,fontWeight:600,cursor:"pointer"}}>처음부터 다시</Btn>
                <Btn onClick={()=>{setResults([]);setIntent("");go(5);}} style={{flex:1,background:`linear-gradient(135deg,${TX},#6b5d4a)`,border:"none",borderRadius:12,padding:13,fontSize:13,color:"#f5f0e8",fontWeight:600,cursor:"pointer"}}>마음을 바꿔서 다시</Btn>
              </div>
              <div style={{textAlign:"center",marginTop:28,paddingBottom:16}}>
                <div style={{display:"inline-flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <div style={{width:18,height:18,borderRadius:6,background:`linear-gradient(135deg,${P},${P2})`,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:9}}>♥</span></div>
                  <span style={{fontSize:13,fontWeight:600,color:TX}}>마로</span>
                </div>
                <div style={{fontSize:10,letterSpacing:2,color:TX3}}>마음을 새기는 선물</div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
