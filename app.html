// ── 태그 점수 (OR 조건 + 매칭 수 가산) ──
function calcTagScore(item,tags){
  if(!tags||tags.length===0) return 10;
  const text=`${item.name} ${item.reason} ${item.sk||''}`.toLowerCase();
  let mc=0;
  tags.forEach(tag=>{const kws=TAG_KW[tag]||[];if(kws.some(kw=>text.includes(kw)))mc++;});
  if(mc===0) return 0;
  if(mc===1) return 15;
  if(mc===2) return 25;
  return 35;
}

// ── 관계×상황×성별 카테고리 가중치 ──
function getCatWeights(rel,occ,gender){
  const w={food:1,beauty:1,fashion:1,home:1,experience:1,tech:1,stationery:1,health:1,hobby:1,custom:1};
  // 관계×상황 가중치
  if(['lover','spouse'].includes(rel)){
    if(['thanks','anniversary','birthday'].includes(occ)){w.experience=2.5;w.fashion=2;w.custom=2.2;w.hobby=1.5;w.food=0.5;w.stationery=0.4;}
  }
  if(['parent','inlaw'].includes(rel)){w.health=2.5;w.food=1.8;w.experience=1.5;w.tech=1.3;w.fashion=0.7;w.hobby=0.5;}
  if(rel==='friend'){w.beauty=1.8;w.hobby=2;w.custom=1.8;w.experience=1.5;w.health=0.5;}
  if(['colleague','mentor'].includes(rel)){w.food=2;w.stationery=1.8;w.beauty=1.5;w.experience=0.3;w.custom=0.3;w.fashion=0.5;}
  // 성별 보정
  if(gender==='female'){w.beauty*=1.8;w.fashion*=1.6;w.custom*=1.4;w.home*=1.3;w.experience*=1.2;w.tech*=0.6;w.hobby*=0.8;}
  if(gender==='male'){w.tech*=2;w.hobby*=1.8;w.food*=1.5;w.fashion*=1.2;w.health*=1.3;w.beauty*=0.5;w.custom*=0.8;}
  return w;
}

// ── Round-Robin Slot-Filling 다양성 알고리즘 (성별 반영) ──
function gfb(o,b,userTags,relId,gender){
  let pool=[...(FB[`${o}|${b}`]||[]),...(FD[b]||FD.b2)];
  const catW=getCatWeights(relId,o,gender);
  pool=pool.map(item=>{
    let score=calcTagScore(item,userTags);
    score*=(catW[item.cat]||1);
    // 성별 매칭 가산
    if(gender&&gender!=='neutral'){
      if(item.g===gender[0]) score+=15; // 일치
      else if(item.g==='n') score+=8;   // 범용
      // 불일치=+0 (제외하지 않고 순위만 낮춤)
    } else { score+=8; } // neutral/미선택은 범용 보너스
    score+=Math.random()*8;
    return{...item,_s:score};
  });
  pool.sort((a,b)=>b._s-a._s);
  const result=[],usedCats=new Set();
  for(const item of pool){if(result.length>=3)break;if(usedCats.has(item.cat))continue;result.push(item);usedCats.add(item.cat);}
  if(result.length<3){for(const item of pool){if(result.length>=3)break;if(!result.includes(item))result.push(item);}}
  console.log("[마로] fallback",result.map(r=>`${r.name}(${r.cat},${r.g})`));
  return result.map(({_s,...item})=>item);
}

        <div style={{textAlign:"center",padding:"24px 0 12px"}}>

          <h1 style={{fontFamily:"'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:20,fontWeight:600,color:TX,margin:0,lineHeight:1.4}}>AI가 분석하는<br/>관계 중심 선물 추천</h1>
        </div>

        {step>=1&&step<=7&&(
          <div style={{margin:"14px 0 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              {["관계","성별","깊이","상황","예산","마음"].map((l,i)=>(
                <span key={i} onClick={()=>{if(i<prog)go(i+1)}} style={{fontSize:10,color:i<prog?TX2:TX3,fontWeight:i<prog?600:400,cursor:i<prog?"pointer":"default",textDecoration:i<prog?"underline":"none",textUnderlineOffset:3}}>{l}</span>
              ))}
            </div>
            <div style={{height:4,background:"#E8DCD8",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.max((prog/6)*100,8)}%`,background:`linear-gradient(90deg,${P},${P2})`,borderRadius:3,transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
            </div>
          </div>
        )}

        <div style={{opacity:fade?1:0,transform:fade?"translateY(0)":"translateY(12px)",transition:"all .28s ease"}}>
          {step===0&&(
            <div style={{textAlign:"center",padding:"40px 0"}}>
              <div style={{fontSize:52,marginBottom:20}}>🎁</div>
              <h2 style={{fontFamily:"'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:20,fontWeight:600,color:TX,marginBottom:10}}>어떤 마음을 전하고 싶으세요?</h2>
              <p style={{fontSize:14,color:TX3,lineHeight:1.7,marginBottom:36}}>선물이 아니라, 관계에서 전하고 싶은<br/>마음을 먼저 정리해드릴게요.</p>
              <Btn onClick={()=>go(1)} ms={280} style={{background:"#2B7A78",color:"#fff",border:"none",borderRadius:14,padding:"16px 48px",fontSize:15,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 20px rgba(43,122,120,.25)",minHeight:52,width:"100%",maxWidth:320}}>지금 시작하기 →</Btn>
              <p style={{fontSize:11,color:"#c0b5a4",marginTop:20}}>약 30초면 완료돼요</p>
            </div>
          )}
          {step===1&&(
            <div>
              <SH n="01" title="누구에게 선물하나요?" sub="관계에 따라 적절한 선물이 달라져요" onBack={()=>go(0)}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {RELATIONS.map(r=>(
                  <Btn key={r.id} onClick={()=>{setRel(r);go(2)}} style={{...card,padding:"16px 12px"}}>
                    <span style={{fontSize:24}}>{r.icon}</span>
                    <div style={{fontSize:14,fontWeight:600,color:TX,marginTop:6}}>{r.label}</div>
                    <div style={{fontSize:11,color:TX3,marginTop:2}}>{r.desc}</div>
                  </Btn>
                ))}
              </div>
            </div>
          )}
          {step===2&&(
            <div>
              <SH n="02" title="선물 받으실 분은?" sub="성별에 따라 더 적합한 선물을 추천해드려요" onBack={()=>go(1)}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                {[{id:"female",icon:"👩",label:"여성"},{id:"male",icon:"👨",label:"남성"},{id:"neutral",icon:"🎁",label:"상관없음"}].map(g=>(
                  <Btn key={g.id} onClick={()=>{setGender(g.id);go(3)}} style={{...card,padding:"18px 10px",textAlign:"center"}}>
                    <span style={{fontSize:28}}>{g.icon}</span>
                    <div style={{fontSize:14,fontWeight:600,color:TX,marginTop:8}}>{g.label}</div>
                  </Btn>
                ))}
              </div>
            </div>
          )}
          {step===3&&(
            <div>
              <SH n="03" title={`${rel?.icon} ${rel?.label}과의 관계 깊이는?`} sub="관계의 깊이에 따라 선물의 무게감이 달라져요" onBack={()=>go(2)}/>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {(rel?.depth||[]).map((d,i)=>(
                  <Btn key={i} onClick={()=>{setDep(d);go(4)}} style={{...card,padding:"14px 18px",fontSize:14,color:TX,fontWeight:500}}>
                    <span style={{marginRight:10,opacity:.4,fontWeight:700}}>{i+1}</span>{d}
                  </Btn>
                ))}
              </div>
            </div>
          )}
          {step===4&&(
            <div>
              <SH n="04" title="어떤 상황인가요?" sub="상황에 따라 선물의 의미가 완전히 달라져요" onBack={()=>go(3)}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {OCCASIONS.map(o=>(
                  <Btn key={o.id} onClick={()=>{setOcc(o);go(5)}} style={{...card,padding:"14px 12px",textAlign:"center"}}>
                    <span style={{fontSize:22}}>{o.icon}</span>
                    <div style={{fontSize:13,fontWeight:600,color:TX,marginTop:5}}>{o.label}</div>
                  </Btn>
                ))}
              </div>
            </div>
          )}
          {step===5&&(
            <div>
              <SH n="05" title="예산은 얼마 정도 생각하세요?" sub="예산에 맞는 최적의 선물을 찾아드릴게요" onBack={()=>go(4)}/>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {BUDGETS.map(b=>(
                  <Btn key={b.id} onClick={()=>{setBud(b);go(6)}} style={{...card,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:14,fontWeight:600,color:TX}}>{b.label}</span>
                    <span style={{fontSize:11,color:P,background:`${P}10`,padding:"3px 10px",borderRadius:20,fontWeight:500}}>{b.tag}</span>
                  </Btn>
                ))}
              </div>
            </div>
          )}
          {step===6&&!loading&&results.length===0&&(
            <div>
              <SH n="06" title="어떤 마음을 전하고 싶으세요?" sub="이 한마디가 선물의 방향을 결정해요 (선택)" onBack={()=>go(5)}/>
              <textarea value={intent} onChange={e=>setIntent(e.target.value)} placeholder="예) 항상 곁에 있어줘서 고마워..."
                style={{width:"100%",minHeight:80,background:"rgba(255,255,255,.8)",border:"1.5px solid #e6dfd4",borderRadius:12,padding:"14px 16px",fontSize:14,color:TX,resize:"none",outline:"none",fontFamily:"inherit",lineHeight:1.6,boxSizing:"border-box",transition:"border-color .2s"}}
                onFocus={e=>e.target.style.borderColor=P} onBlur={e=>e.target.style.borderColor="#e6dfd4"}/>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,margin:"10px 0 20px"}}>
                {(INTENT_HINTS[rel?.id]||INTENT_HINTS.friend).map((s,i)=>(
                  <button key={i} onClick={()=>setIntent(s)} style={{background:intent===s?`${P}20`:"rgba(255,255,255,.6)",border:`1px solid ${intent===s?P:"#e2dbd0"}`,borderRadius:20,padding:"5px 13px",fontSize:12,color:intent===s?P:TX3,cursor:"pointer",transition:"all .15s",fontWeight:intent===s?600:400}}>{s}</button>
                ))}
              </div>
              <div style={{marginBottom:18}}>
                <div style={{fontSize:12,fontWeight:600,color:TX2,marginBottom:8}}>🔍 이 사람 관심사 <span style={{fontWeight:400,color:TX3}}>(선택, 최대 5개)</span></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {TAGS.map(t=>{const on=tags.includes(t.id);return(
                    <button key={t.id} onClick={()=>toggleTag(t.id)} style={{background:on?`${P}14`:"rgba(255,255,255,.6)",border:`1px solid ${on?P:"#e2dbd0"}`,borderRadius:20,padding:"4px 11px",fontSize:11,color:on?P:TX3,cursor:"pointer",transition:"all .15s",fontWeight:on?600:400}}>{t.em} {t.label}</button>
                  );})}
                </div>
                {tags.length>0&&<div style={{fontSize:11,color:P,marginTop:6}}>{tags.length}개 선택됨</div>}
              </div>
              <div style={{background:"rgba(255,255,255,.6)",border:"1px solid #e6dfd4",borderRadius:12,padding:"12px 16px",marginBottom:18}}>
                <div style={{fontSize:11,color:P,fontWeight:600,marginBottom:6,letterSpacing:1}}>분석 요약</div>
                <div style={{fontSize:13,color:TX2,lineHeight:1.7}}>{rel?.icon} {rel?.label} ({dep}) · {occ?.icon} {occ?.label} · {bud?.label}</div>
              </div>
              <Btn onClick={analyze} ms={300} style={{width:"100%",background:"#2B7A78",color:"#fff",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 20px rgba(43,122,120,.25)",minHeight:52}}>AI 분석 시작하기 ✨</Btn>
              <button onClick={()=>{setIntent("");analyze();}} style={{width:"100%",background:"transparent",border:"none",color:TX3,fontSize:13,padding:12,cursor:"pointer",marginTop:4}}>건너뛰기 — AI가 알아서 판단할게요</button>
            </div>
          )}
          {loading&&(
            <div style={{textAlign:"center",padding:"60px 0"}}>
              <div style={{width:56,height:56,margin:"0 auto 24px",border:"3px solid #e6dfd4",borderTop:`3px solid ${P}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
              <p style={{fontSize:15,color:TX2,fontWeight:500,marginBottom:6}}>{LM[lm]}</p>
              <p style={{fontSize:12,color:TX3}}>{anaText} 최적의 선물을 찾고 있어요</p>
            </div>
          )}
          {!loading&&results.length>0&&(()=>{
            const compats=[Math.floor(92+Math.random()*7),0,0];
            compats[1]=compats[0]-Math.floor(3+Math.random()*5);
            compats[2]=compats[1]-Math.floor(3+Math.random()*5);
            return(
            <div>
              {/* 제목 */}
              <div style={{textAlign:"center",marginBottom:20}}>
                <h2 style={{fontFamily:"'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:20,fontWeight:700,color:TX,margin:"0 0 6px"}}>이런 선물은 어떨까요?</h2>
                <p style={{fontSize:13,color:TX2,margin:0}}>💖 {rel?.label}{dep?` (${dep})`:""} · {genderLabel} · {occ?.label} · {bud?.label}</p>
              </div>

              {/* 카드 3장 */}
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {results.map((g,i)=>{
                  const sk=g.searchKeyword||g.sk||g.name;
                  const url=mkUrl(sk,g.price);
                  const compat=compats[i];
                  const rank=["1st","2nd","3rd"][i];
                  return(
                    <ResultCard key={i} g={g} i={i} rank={rank} compat={compat} url={url} P={P} P2={P2} TX={TX} TX2={TX2} TX3={TX3}/>
                  );
                })}
              </div>

              {/* 팁 */}
              <div style={{background:`${P}06`,border:`1px dashed ${P}25`,borderRadius:12,padding:"12px 16px",marginTop:16}}>
                <div style={{fontSize:12,color:"#6a5a4a",lineHeight:1.7}}>💡 <strong>TIP</strong> — 선물과 함께 짧은 손편지를 곁들이면 마음이 더 잘 전달돼요.{intent&&` "${intent}" 이 마음을 직접 적어보는 건 어떨까요?`}</div>
              </div>

              {/* 쿠팡 파트너스 고지 */}
              <div style={{background:"rgba(0,0,0,.03)",border:"1px solid rgba(0,0,0,.07)",borderRadius:10,padding:"10px 14px",marginTop:10}}>
                <div style={{fontSize:11,color:TX3,lineHeight:1.7}}>📢 위 상품 링크는 <strong>쿠팡 파트너스</strong> 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>
              </div>

              {/* SNS 공유 */}
              <div style={{marginTop:18}}>
                <div style={{fontSize:12,fontWeight:600,color:TX2,marginBottom:8,textAlign:"center"}}>추천 결과 공유하기</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {typeof navigator!=="undefined"&&navigator.share&&(
                    <button onClick={()=>{try{navigator.share({title:"마로 - AI 선물 추천",text:`${rel?.label}에게 ${occ?.label} 선물로 ${results[0]?.name}을(를) 추천받았어요!`,url:"https://maro.ai.kr/app"})}catch{}}} style={{border:".5px solid #E8DCD8",borderRadius:12,padding:10,background:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:12,color:TX2,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                      <span style={{fontSize:18}}>📤</span>공유하기
                    </button>
                  )}
                  <button onClick={()=>{const t=encodeURIComponent(`${rel?.label}에게 ${occ?.label} 선물 추천받았어요!`);const u=encodeURIComponent("https://maro.ai.kr/app");window.open(`https://story.kakao.com/share?url=${u}&text=${t}`,"_blank")}} style={{border:".5px solid #E8DCD8",borderRadius:12,padding:10,background:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:12,color:TX2,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <span style={{fontSize:18}}>💬</span>카카오
                  </button>
                  <button onClick={async()=>{try{await navigator.clipboard.writeText("https://maro.ai.kr/app");alert("✅ 링크가 복사되었어요!")}catch{}}} style={{border:".5px solid #E8DCD8",borderRadius:12,padding:10,background:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:12,color:TX2,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <span style={{fontSize:18}}>🔗</span>링크 복사
                  </button>
                </div>
              </div>

              {/* 액션 버튼 */}
              <div style={{marginTop:18,display:"flex",flexDirection:"column",gap:10}}>
                <Btn onClick={()=>{setResults([]);analyze()}} style={{width:"100%",background:"rgba(255,255,255,.8)",border:"1.5px solid #e6dfd4",borderRadius:12,padding:14,fontSize:14,color:TX,fontWeight:600,cursor:"pointer"}}>↻ 다른 추천 보기</Btn>
                <div style={{display:"flex",gap:10}}>
                  <Btn onClick={restart} style={{flex:1,background:"rgba(255,255,255,.6)",border:"1.5px solid #e6dfd4",borderRadius:12,padding:13,fontSize:13,color:TX2,fontWeight:500,cursor:"pointer"}}>처음부터</Btn>
                  <Btn onClick={()=>{setResults([]);setIntent("");go(6)}} style={{flex:1,background:"rgba(255,255,255,.6)",border:"1.5px solid #e6dfd4",borderRadius:12,padding:13,fontSize:13,color:TX2,fontWeight:500,cursor:"pointer"}}>마음 바꿔서</Btn>
                </div>
              </div>

              <div style={{textAlign:"center",marginTop:28,paddingBottom:16}}>
                <div style={{display:"inline-flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <div style={{width:18,height:18,borderRadius:6,background:`linear-gradient(135deg,${P},${P2})`,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:9}}>♥</span></div>
                  <span style={{fontSize:13,fontWeight:600,color:TX}}>마로</span>
                </div>
                <div style={{fontSize:10,letterSpacing:2,color:TX3}}>마음을 새기는 선물</div>
              </div>
            </div>
          );})()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
<footer style="text-align:center;padding:16px;font-size:11px;color:#a09585;line-height:1.7;border-top:1px solid #ebe4dc;margin-top:24px">
  <div>이 페이지의 상품 링크는 <strong>쿠팡 파트너스</strong> 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>
  <div style="margin-top:6px"><a href="/privacy" style="color:#a09585">개인정보처리방침</a> · <a href="/terms" style="color:#a09585">이용약관</a></div>
</footer>
</body>
</html>
