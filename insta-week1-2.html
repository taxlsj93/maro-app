<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>마로 인스타그램 카드 2</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      background: #faf6f1;
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Top header band */
    .header-band {
      background: #c4756e;
      padding: 36px 64px 32px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left {}
    .header-tag {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .header-title {
      font-size: 46px;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      letter-spacing: -1.5px;
    }
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: #c4756e;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .d-day-badge {
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.5);
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 50px;
      letter-spacing: -0.3px;
    }

    /* Content area */
    .content {
      flex: 1;
      padding: 44px 64px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-label {
      font-size: 16px;
      font-weight: 600;
      color: #a89080;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: -4px;
    }

    /* Budget cards */
    .budget-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 36px;
      display: flex;
      align-items: center;
      gap: 24px;
      box-shadow: 0 4px 20px rgba(60, 30, 20, 0.07);
      border-left: 6px solid transparent;
      transition: none;
    }
    .budget-card.tier1 { border-left-color: #e8b4a0; }
    .budget-card.tier2 { border-left-color: #c4756e; }
    .budget-card.tier3 { border-left-color: #8b3e35; }

    .budget-emoji {
      font-size: 36px;
      flex-shrink: 0;
      line-height: 1;
    }
    .budget-body {
      flex: 1;
    }
    .budget-range {
      font-size: 15px;
      font-weight: 700;
      color: #c4756e;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .budget-items {
      font-size: 26px;
      font-weight: 700;
      color: #2a1f1c;
      letter-spacing: -0.5px;
      line-height: 1.3;
    }
    .budget-sep {
      color: #c4b8a8;
      font-weight: 400;
      margin: 0 6px;
    }

    /* Tip box */
    .tip-box {
      background: rgba(196, 117, 110, 0.1);
      border: 2px solid rgba(196, 117, 110, 0.25);
      border-radius: 18px;
      padding: 26px 36px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 4px;
    }
    .tip-icon {
      font-size: 28px;
      flex-shrink: 0;
    }
    .tip-text {
      font-size: 22px;
      font-weight: 700;
      color: #3a2018;
      line-height: 1.5;
      letter-spacing: -0.3px;
    }
    .tip-text .accent {
      color: #c4756e;
    }

    /* Bottom CTA */
    .cta-bar {
      height: 88px;
      background: #2a1f1c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-shrink: 0;
      margin-top: auto;
    }
    .cta-arrow {
      font-size: 22px;
      color: #c4756e;
    }
    .cta-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .cta-url {
      font-size: 20px;
      font-weight: 600;
      color: #c4756e;
    }
  </style>
</head>
<body>
  <div class="header-band">
    <div class="header-left">
      <div class="header-tag">Seasonal Guide</div>
      <div class="header-title">어버이날 선물<br>예산별 가이드</div>
    </div>
    <div class="header-right">
      <div class="logo">
        <div class="logo-icon">마</div>
        <span class="logo-text">마로</span>
      </div>
      <div class="d-day-badge">🗓️ D-22</div>
    </div>
  </div>

  <div class="content">
    <div class="section-label">Budget Guide</div>

    <div class="budget-card tier1">
      <div class="budget-emoji">💰</div>
      <div class="budget-body">
        <div class="budget-range">2만원대</div>
        <div class="budget-items">핸드크림<span class="budget-sep">·</span>벌꿀 세트</div>
      </div>
    </div>

    <div class="budget-card tier2">
      <div class="budget-emoji">💰</div>
      <div class="budget-body">
        <div class="budget-range">5만원대</div>
        <div class="budget-items">안마 쿠션<span class="budget-sep">·</span>건강식품</div>
      </div>
    </div>

    <div class="budget-card tier3">
      <div class="budget-emoji">💰</div>
      <div class="budget-body">
        <div class="budget-range">10만원대</div>
        <div class="budget-items">스마트 체중계<span class="budget-sep">·</span>전기포트</div>
      </div>
    </div>

    <div class="tip-box">
      <div class="tip-icon">💡</div>
      <div class="tip-text">
        핵심: <span class="accent">'매일 쓰는 것'</span>이<br>감동이 오래간다
      </div>
    </div>
  </div>

  <div class="cta-bar">
    <span class="cta-text">30초 만에 추천받기</span>
    <span class="cta-arrow">→</span>
    <span class="cta-url">maro.ai.kr</span>
  </div>
</body>
</html>
