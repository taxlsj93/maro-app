name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # @claude 멘션 시 대화식 응답
  claude-interactive:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # PR 오픈 시 자동 코드 리뷰
  claude-pr-review:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            이 PR을 리뷰해주세요:
            1. 버그 또는 로직 오류
            2. Vite + Firebase 빌드 호환성
            3. 쿠팡파트너스 어필리에이트 링크 정확성
            4. maro.ai.kr Vercel 배포에 영향을 줄 수 있는 변경사항
            5. 한국어 UX 카피 자연스러움
            결과는 한국어로 PR 코멘트로 남겨주세요.
          claude_args: "--max-turns 8"

  # 'ai-pr' 레이블 이슈 → 자동 구현
  claude-auto-implement:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ai-pr'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            이 이슈를 구현하고 PR을 생성해주세요.
            - Vite 빌드 환경 유지 (npm run build 통과 필수)
            - Firebase 설정 변경 금지
            - 런치 QA 기준에 맞는 코드 작성
          claude_args: "--max-turns 15"
