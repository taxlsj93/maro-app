<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e0e0e0}
.card{
  width:1080px;height:1080px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#faf6ee 0%,#f5ede3 40%,#faf6f1 70%,#ede0d0 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
/* 배경 데코 원 */
.deco1{position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(196,117,110,.06);top:-120px;right:-80px}
.deco2{position:absolute;width:350px;height:350px;border-radius:50%;background:rgba(196,117,110,.05);bottom:-100px;left:-60px}
.deco3{position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(196,117,110,.04);top:40%;left:10%}
/* 상단 로고 */
.logo{
  position:absolute;top:60px;
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:22px;font-weight:700;
  color:#c4756e;letter-spacing:8px;text-transform:uppercase;
}
.logo-sub{
  position:absolute;top:92px;
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:13px;color:#8a7a73;letter-spacing:4px;
}
/* 중앙 텍스트 */
.headline{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:72px;font-weight:700;
  color:#2d2018;line-height:1.4;text-align:center;margin-bottom:24px;
  position:relative;
}
.headline em{font-style:normal;color:#c4756e}
.sub{
  font-family:'Noto Sans KR',sans-serif;font-size:26px;font-weight:400;
  color:#5a4a3a;text-align:center;line-height:1.7;margin-bottom:48px;
  position:relative;
}
/* CTA 버튼 */
.cta{
  position:relative;
  background:#c4756e;color:#fff;padding:22px 64px;border-radius:16px;
  font-family:'Noto Sans KR',sans-serif;font-size:24px;font-weight:500;
  letter-spacing:2px;box-shadow:0 8px 32px rgba(196,117,110,.3);
}
/* 하단 도메인 */
.domain{
  position:absolute;bottom:56px;
  font-family:'Noto Sans KR',sans-serif;font-size:18px;color:#8a7a73;letter-spacing:3px;
}
/* 장식 라인 */
.line{
  width:60px;height:3px;background:#c4756e;border-radius:2px;
  margin-bottom:32px;position:relative;opacity:.6;
}
</style>
</head>
<body>
<div class="card">
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="deco3"></div>
  <div class="logo">MARO</div>
  <div class="logo-sub">마음을 새기는 선물</div>
  <div class="line"></div>
  <div class="headline">선물 고민,<br><em>3분</em>이면 끝</div>
  <div class="sub">관계와 상황에 맞는 선물을<br>마로가 찾아드려요</div>
  <div class="cta">지금 시작하기</div>
  <div class="domain">maro.ai.kr</div>
</div>
</body>
</html>
