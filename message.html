<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선물 메시지 생성기 — 마로</title>
<meta property="og:title" content="마로 — AI 선물 메시지 생성기">
<meta property="og:description" content="관계와 상황에 딱 맞는 선물 카드 문구를 AI가 만들어드려요">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#faf8f4,#f5f0e8,#f0ebe0);min-height:100vh;color:#2d2420}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState} = React;
const P="#c4756e",P2="#a85e58";

const RELS=["연인","배우자","친구","부모님","직장 동료/상사","선생님","친척","시댁/처가"];
const OCCS=["생일","기념일","감사","축하","결혼","출산","집들이","병문안","사과","명절","그냥"];
const TONES=["따뜻하고 진심 어린","유머러스하고 가벼운","격식 있고 정중한","감성적이고 시적인"];

function App(){
  const[rel,setRel]=useState("");
  const[occ,setOcc]=useState("");
  const[tone,setTone]=useState("");
  const[name,setName]=useState("");
  const[extra,setExtra]=useState("");
  const[msgs,setMsgs]=useState([]);
  const[loading,setLoading]=useState(false);
  const[copied,setCopied]=useState(-1);

  const generate=async()=>{
    if(!rel||!occ)return;
    setLoading(true);setMsgs([]);
    const prompt=`당신은 한국어 선물 카드 문구 작가입니다.
관계: ${rel}, 상황: ${occ}, 톤: ${tone||"따뜻하고 진심 어린"}
${name?`받는 사람 이름: ${name}`:""}
${extra?`추가 정보: ${extra}`:""}

규칙:
1. 선물 카드에 쓸 수 있는 문구 3가지를 만들어주세요
2. 각 문구는 2~4문장, 자연스러운 한국어
3. 관계와 상황에 맞는 적절한 존댓말/반말 사용
4. 진부하지 않고 진심이 느껴지는 문구

JSON만 출력: {"messages":["문구1","문구2","문구3"]}`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})});
      const d=await r.json();const t=d.content?.[0]?.text||"";const m=t.match(/\{[\s\S]*\}/);
      if(m){const p=JSON.parse(m[0]);setMsgs(p.messages||[]);}
    }catch(e){setMsgs(["마음을 담아 전하는 선물, 늘 고마운 당신에게.","함께한 시간이 소중해서, 이 마음을 선물에 담았어요.","당신이 있어 제 하루가 더 빛나요. 항상 감사합니다."]);}
    setLoading(false);
  };

  const copy=(i)=>{navigator.clipboard?.writeText(msgs[i]);setCopied(i);setTimeout(()=>setCopied(-1),2000);};

  const s={select:{width:"100%",padding:"12px 16px",border:"1.5px solid #e6dfd4",borderRadius:12,fontSize:14,color:"#2d2420",background:"#fff",outline:"none",appearance:"none",cursor:"pointer"},
    input:{width:"100%",padding:"12px 16px",border:"1.5px solid #e6dfd4",borderRadius:12,fontSize:14,color:"#2d2420",background:"#fff",outline:"none"}};

  return(
    <div style={{maxWidth:460,margin:"0 auto",padding:"20px 20px 40px",minHeight:"100vh"}}>
      <div style={{textAlign:"center",padding:"24px 0 20px"}}>
        <a href="/" style={{textDecoration:"none",display:"inline-flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${P},${P2})`,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:13}}>♥</span></div>
          <span style={{fontSize:18,fontWeight:700,color:"#2d2420"}}>마로</span>
        </a>
        <h1 style={{fontFamily:"'Gowun Batang',serif",fontSize:22,fontWeight:700,color:"#2d2420",marginBottom:6}}>선물 메시지 생성기</h1>
        <p style={{fontSize:13,color:"#9a8a7a"}}>AI가 관계와 상황에 딱 맞는 카드 문구를 만들어드려요</p>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"#5a4a3a",marginBottom:4,display:"block"}}>누구에게? *</label>
          <select value={rel} onChange={e=>setRel(e.target.value)} style={s.select}>
            <option value="">관계를 선택하세요</option>
            {RELS.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"#5a4a3a",marginBottom:4,display:"block"}}>어떤 상황? *</label>
          <select value={occ} onChange={e=>setOcc(e.target.value)} style={s.select}>
            <option value="">상황을 선택하세요</option>
            {OCCS.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"#5a4a3a",marginBottom:4,display:"block"}}>문구 톤</label>
          <select value={tone} onChange={e=>setTone(e.target.value)} style={s.select}>
            <option value="">기본 (따뜻한 톤)</option>
            {TONES.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"#5a4a3a",marginBottom:4,display:"block"}}>받는 사람 이름 (선택)</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="예) 민수, 엄마" style={s.input}/>
        </div>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"#5a4a3a",marginBottom:4,display:"block"}}>추가로 전하고 싶은 말 (선택)</label>
          <input value={extra} onChange={e=>setExtra(e.target.value)} placeholder="예) 항상 야근하느라 고생 많아" style={s.input}/>
        </div>
      </div>

      <button onClick={generate} disabled={!rel||!occ||loading} style={{width:"100%",padding:15,background:(!rel||!occ)?"#ccc":`linear-gradient(135deg,${P},${P2})`,color:"#fff",border:"none",borderRadius:14,fontSize:15,fontWeight:600,cursor:(!rel||!occ)?"not-allowed":"pointer",boxShadow:(!rel||!occ)?"none":`0 6px 24px ${P}30`}}>
        {loading?"문구를 만들고 있어요... ✍️":"카드 문구 만들기 ✨"}
      </button>

      {loading&&<div style={{textAlign:"center",padding:"40px 0"}}><div style={{width:40,height:40,margin:"0 auto 16px",border:`3px solid #e6dfd4`,borderTop:`3px solid ${P}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/><p style={{fontSize:13,color:"#9a8a7a"}}>AI가 마음을 담은 문구를 작성하고 있어요</p></div>}

      {msgs.length>0&&(
        <div style={{marginTop:24}}>
          <div style={{fontSize:11,letterSpacing:2,color:P,fontWeight:700,marginBottom:12}}>AI 생성 완료</div>
          {msgs.map((m,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,.9)",border:i===0?`2px solid ${P}`:"1.5px solid #ebe4dc",borderRadius:16,padding:18,marginBottom:12,position:"relative",animation:`up .3s ease ${i*.1}s both`}}>
              {i===0&&<div style={{position:"absolute",top:10,right:12,background:P,color:"#fff",fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20}}>BEST</div>}
              <div style={{fontFamily:"'Gowun Batang',serif",fontSize:15,color:"#2d2420",lineHeight:1.8,marginBottom:12,whiteSpace:"pre-wrap"}}>{m}</div>
              <button onClick={()=>copy(i)} style={{display:"flex",alignItems:"center",gap:6,background:copied===i?`${P}15`:"rgba(0,0,0,.04)",border:`1px solid ${copied===i?P:"#e6dfd4"}`,borderRadius:8,padding:"7px 14px",fontSize:12,color:copied===i?P:"#5a4a3a",fontWeight:600,cursor:"pointer"}}>
                {copied===i?"✅ 복사됨!":"📋 문구 복사하기"}
              </button>
            </div>
          ))}
          <button onClick={generate} style={{width:"100%",padding:12,background:"rgba(255,255,255,.7)",border:`1.5px solid #e6dfd4`,borderRadius:12,fontSize:13,color:"#5a4a3a",fontWeight:600,cursor:"pointer",marginTop:4}}>🔄 다른 문구 만들기</button>
        </div>
      )}

      <div style={{textAlign:"center",marginTop:32}}>
        <a href="/app" style={{display:"inline-flex",alignItems:"center",gap:6,background:`${P}08`,border:`1px solid ${P}20`,borderRadius:10,padding:"10px 20px",textDecoration:"none",fontSize:13,color:P,fontWeight:600}}>🎁 선물도 추천받기 →</a>
      </div>

      <div style={{textAlign:"center",marginTop:24,fontSize:10,color:"#c8b8a8"}}>© 2025 마로 · 마음을 새기는 선물</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
