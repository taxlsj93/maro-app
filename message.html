<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>마음 카드 — 마로</title>
<meta name="description" content="선물에 마음을 더하세요. 마로 메시지 카드.">
<meta property="og:title" content="마음 카드 — 마로">
<meta property="og:description" content="선물에 마음을 더하세요. 나만의 메시지 카드를 만들어보세요.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://maro.ai.kr/og-image.png">
<meta property="og:url" content="https://maro.ai.kr/message">
<link rel="canonical" href="https://maro.ai.kr/message">
<meta name="theme-color" content="#c4756e">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-S3Y94YY9WP"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-S3Y94YY9WP');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --terra:#c4756e;--terra-dark:#a85e58;--terra-light:#e8ada8;--terra-pale:#fdf5f4;
  --cream-1:#faf6ee;--cream-2:#f5ede3;--cream-3:#faf6f1;
  --warm-gray:#6b5e57;--text:#2d2018;--text-light:#5a4a3a;--text-muted:#8a7a73;
  --card-bg:rgba(255,255,255,.65);--shadow:0 2px 16px rgba(164,94,88,.10);
}
html{font-size:16px}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:linear-gradient(160deg, var(--cream-1) 0%, var(--cream-2) 50%, var(--cream-3) 100%);
  color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;
}

.maro-header{text-align:center;padding:44px 20px 0}
.maro-logo{
  font-family:'Gowun Batang',serif;font-size:.9rem;letter-spacing:6px;
  text-transform:uppercase;color:var(--terra);font-weight:700;margin-bottom:6px;
}
.maro-tagline{font-family:'Gowun Batang',serif;font-size:.72rem;color:var(--text-muted);letter-spacing:2px}

.container{max-width:480px;margin:0 auto;padding:24px 16px 40px}

.section-title{
  font-family:'Gowun Batang',serif;
  font-size:1.25rem;font-weight:700;text-align:center;
  margin-bottom:6px;line-height:1.5;
}
.section-sub{
  font-size:.82rem;color:var(--text-muted);text-align:center;
  margin-bottom:28px;line-height:1.6;
}

/* Theme selector */
.theme-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  margin-bottom:28px;
}
.theme-btn{
  aspect-ratio:1;border-radius:16px;border:2.5px solid transparent;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  transition:all .25s ease;font-family:'Noto Sans KR',sans-serif;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 2px 8px rgba(164,94,88,.06);
}
.theme-btn:hover{transform:scale(1.06);box-shadow:0 4px 14px rgba(164,94,88,.12)}
.theme-btn.active{border-color:var(--terra);transform:scale(1.06);box-shadow:0 4px 14px rgba(196,117,110,.18)}
.theme-emoji{font-size:1.6rem}
.theme-label{font-size:.6rem;color:var(--text-light);font-weight:500}

/* Form */
.form-group{margin-bottom:16px}
.form-label{
  font-size:.78rem;font-weight:500;color:var(--warm-gray);
  margin-bottom:6px;display:block;
}
.form-input{
  width:100%;padding:14px 16px;border:1.5px solid #e0d5cf;border-radius:14px;
  font-family:'Gowun Batang',serif;font-size:.88rem;color:var(--text);
  background:rgba(255,255,255,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  outline:none;transition:all .25s ease;
}
.form-input:focus{border-color:var(--terra);box-shadow:0 0 0 3px rgba(196,117,110,.1)}
.form-input::placeholder{color:#c4b8b0}
textarea.form-input{resize:vertical;min-height:120px;line-height:1.8}

.char-count{
  text-align:right;font-size:.68rem;color:var(--text-muted);margin-top:4px;
}

/* Card preview */
.preview-wrap{
  margin:28px 0;perspective:600px;
}
.card-preview{
  background:rgba(255,255,255,.65);border-radius:20px;padding:36px 28px;
  box-shadow:0 8px 32px rgba(164,94,88,.12);text-align:center;
  min-height:280px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  transition:all .4s ease;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.4);
}

.card-deco{
  position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;
  opacity:.08;
}
.card-pattern{
  width:100%;height:100%;
  background-image:
    radial-gradient(circle at 20% 30%, var(--terra) 1px, transparent 1px),
    radial-gradient(circle at 80% 70%, var(--terra) 1px, transparent 1px),
    radial-gradient(circle at 50% 10%, var(--terra) 1.5px, transparent 1.5px),
    radial-gradient(circle at 10% 80%, var(--terra) 1px, transparent 1px),
    radial-gradient(circle at 90% 20%, var(--terra) 1px, transparent 1px);
  background-size:100% 100%;
}

.card-theme-icon{font-size:2.8rem;margin-bottom:16px;position:relative}
.card-to{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.72rem;color:var(--terra);letter-spacing:2px;
  font-weight:500;margin-bottom:12px;position:relative;
}
.card-message{
  font-family:'Gowun Batang',serif;
  font-size:1rem;line-height:2;color:var(--text);
  white-space:pre-wrap;word-break:keep-all;
  position:relative;max-width:280px;
}
.card-from{
  font-family:'Gowun Batang',serif;
  font-size:.78rem;color:var(--text-muted);margin-top:20px;
  position:relative;
}
.card-brand{
  position:absolute;bottom:12px;right:16px;
  font-size:.55rem;color:var(--terra-light);letter-spacing:3px;
  font-weight:700;
}

/* Actions */
.action-row{display:flex;gap:10px;margin-top:24px}
.action-btn{
  flex:1;padding:14px;border-radius:14px;border:1.5px solid var(--terra-light);
  background:rgba(255,255,255,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  color:var(--terra);font-family:'Noto Sans KR',sans-serif;
  font-size:.82rem;font-weight:500;cursor:pointer;transition:all .25s ease;
}
.action-btn:hover{background:var(--terra-pale);transform:translateY(-1px);box-shadow:0 4px 12px rgba(196,117,110,.12)}
.action-btn:active{transform:translateY(0)}
.action-btn.primary{background:var(--terra);color:#fff;border-color:var(--terra);box-shadow:0 4px 16px rgba(196,117,110,.25)}
.action-btn.primary:hover{background:var(--terra-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,117,110,.3)}

/* Saved toast */
.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:#fff;padding:12px 24px;border-radius:14px;
  font-size:.82rem;font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 4px 16px rgba(0,0,0,.2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:transform .3s ease;z-index:999;
}
.toast.show{transform:translateX(-50%) translateY(0)}

.maro-footer{
  text-align:center;padding:24px 20px 36px;
  border-top:1px solid rgba(196,117,110,.12);
}
.maro-footer a{
  font-family:'Gowun Batang',serif;
  color:var(--terra);text-decoration:none;font-size:.78rem;
  font-weight:700;letter-spacing:2px;transition:opacity .2s;
}
.maro-footer a:hover{opacity:.7}

/* Mobile */
@media(max-width:380px){
  .section-title{font-size:1.1rem}
  .form-input{padding:12px 14px;font-size:.82rem}
  .card-preview{padding:28px 20px;min-height:240px}
  .card-message{font-size:.9rem;max-width:240px}
  .action-row{flex-direction:column}
  .theme-grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .maro-header{padding:32px 16px 0}
}
</style>
</head>
<body>

<header class="maro-header">
  <div class="maro-logo">MARO</div>
  <div class="maro-tagline">마음을 새기는 선물</div>
</header>

<div class="container">
  <h2 class="section-title">마음을 새겨보세요</h2>
  <p class="section-sub">선물과 함께 전할<br>나만의 메시지 카드</p>

  <!-- Theme -->
  <div class="theme-grid" id="themeGrid"></div>

  <!-- Form -->
  <div class="form-group">
    <label class="form-label">받는 사람</label>
    <input class="form-input" id="toName" placeholder="예: 지은이에게" maxlength="20" oninput="updatePreview()">
  </div>

  <div class="form-group">
    <label class="form-label">메시지</label>
    <textarea class="form-input" id="msgBody" placeholder="전하고 싶은 마음을 적어주세요" maxlength="200" oninput="updatePreview()"></textarea>
    <div class="char-count"><span id="charCount">0</span>/200</div>
  </div>

  <div class="form-group">
    <label class="form-label">보내는 사람</label>
    <input class="form-input" id="fromName" placeholder="예: 수현 올림" maxlength="20" oninput="updatePreview()">
  </div>

  <!-- Preview -->
  <div class="preview-wrap">
    <div class="card-preview" id="cardPreview">
      <div class="card-deco"><div class="card-pattern"></div></div>
      <div class="card-theme-icon" id="previewIcon">💝</div>
      <div class="card-to" id="previewTo">받는 사람에게</div>
      <div class="card-message" id="previewMsg">여기에 메시지가 보여요</div>
      <div class="card-from" id="previewFrom">보내는 사람</div>
      <div class="card-brand">MARO</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="action-btn" onclick="saveAsImage()">📷 이미지 저장</button>
    <button class="action-btn primary" onclick="shareCard()">💌 카드 공유</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer class="maro-footer">
  <a href="/">MARO</a>
  <div style="font-size:.68rem;color:rgba(250,246,238,.35);margin-top:6px"><a href="/privacy" style="color:inherit">개인정보처리방침</a> · <a href="/terms" style="color:inherit">이용약관</a></div>
</footer>

<script>
// ── 테마 ──
const THEMES = [
  { id:'love', emoji:'💝', label:'사랑', bg:'#fff0ef', accent:'#c4756e' },
  { id:'thanks', emoji:'🙏', label:'감사', bg:'#f5f0e8', accent:'#b8956a' },
  { id:'cheer', emoji:'🌟', label:'응원', bg:'#fef9e7', accent:'#d4a843' },
  { id:'congrats', emoji:'🎊', label:'축하', bg:'#f0f4e8', accent:'#7a9e6b' },
  { id:'comfort', emoji:'🫂', label:'위로', bg:'#eef0f8', accent:'#7b8ab8' },
  { id:'miss', emoji:'🌙', label:'그리움', bg:'#f3eef8', accent:'#9b7bb8' },
  { id:'bday', emoji:'🎂', label:'생일', bg:'#fff3e8', accent:'#d48a5a' },
  { id:'daily', emoji:'☺️', label:'일상', bg:'#f0f5f0', accent:'#6b9e78' },
];

let currentTheme = THEMES[0];

// 테마 그리드 렌더
const grid = document.getElementById('themeGrid');
THEMES.forEach((t, i) => {
  const btn = document.createElement('button');
  btn.className = 'theme-btn' + (i === 0 ? ' active' : '');
  btn.style.background = t.bg;
  btn.innerHTML = `<span class="theme-emoji">${t.emoji}</span><span class="theme-label">${t.label}</span>`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTheme = t;
    updatePreview();
  });
  grid.appendChild(btn);
});

// ── 프리뷰 업데이트 ──
function updatePreview() {
  const to = document.getElementById('toName').value.trim();
  const msg = document.getElementById('msgBody').value;
  const from = document.getElementById('fromName').value.trim();

  document.getElementById('previewIcon').textContent = currentTheme.emoji;
  document.getElementById('previewTo').textContent = to || '받는 사람에게';
  document.getElementById('previewMsg').textContent = msg || '여기에 메시지가 보여요';
  document.getElementById('previewFrom').textContent = from || '보내는 사람';
  document.getElementById('charCount').textContent = msg.length;

  const card = document.getElementById('cardPreview');
  card.style.background = currentTheme.bg;
  card.querySelector('.card-to').style.color = currentTheme.accent;
  card.querySelector('.card-brand').style.color = currentTheme.accent + '80';
}

// ── 이미지 저장 (canvas) ──
function ga(e,p={}){try{window.gtag?.('event',e,p)}catch{}}

function saveAsImage() {
  ga('card_save',{theme:currentTheme.id});
  const card = document.getElementById('cardPreview');
  const to = document.getElementById('previewTo').textContent;
  const msg = document.getElementById('previewMsg').textContent;
  const from = document.getElementById('previewFrom').textContent;

  const canvas = document.createElement('canvas');
  const scale = 2;
  canvas.width = 640 * scale;
  canvas.height = 480 * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // 배경
  ctx.fillStyle = currentTheme.bg;
  roundRect(ctx, 0, 0, 640, 480, 24);
  ctx.fill();

  // 데코
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = currentTheme.accent;
  for (let i = 0; i < 20; i++) {
    ctx.beginPath();
    ctx.arc(Math.random()*640, Math.random()*480, Math.random()*3+1, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 아이콘
  ctx.font = '48px serif';
  ctx.textAlign = 'center';
  ctx.fillText(currentTheme.emoji, 320, 120);

  // TO
  ctx.font = '700 13px "Gowun Batang", serif';
  ctx.fillStyle = currentTheme.accent;
  ctx.fillText(to, 320, 165);

  // 메시지
  ctx.font = '18px "Gowun Batang", serif';
  ctx.fillStyle = '#3d2f2a';
  wrapText(ctx, msg, 320, 210, 480, 32);

  // FROM
  ctx.font = '14px "Gowun Batang", serif';
  ctx.fillStyle = '#8a7a73';
  ctx.fillText(from, 320, 420);

  // MARO
  ctx.font = '700 10px "Gowun Batang", serif';
  ctx.fillStyle = currentTheme.accent + '60';
  ctx.textAlign = 'right';
  ctx.fillText('MARO', 620, 465);

  // 다운로드
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'maro-card.png';
    a.click();
    URL.revokeObjectURL(url);
    showToast('카드가 저장되었어요 📷');
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const lines = text.split('\n');
  let dy = y;
  lines.forEach(line => {
    const chars = line.split('');
    let current = '';
    chars.forEach(ch => {
      if (ctx.measureText(current + ch).width > maxW) {
        ctx.fillText(current, x, dy);
        current = ch;
        dy += lineH;
      } else {
        current += ch;
      }
    });
    ctx.fillText(current, x, dy);
    dy += lineH;
  });
}

// ── 공유 ──
function shareCard() {
  ga('card_share',{theme:currentTheme.id});
  const to = document.getElementById('toName').value.trim() || '소중한 사람';
  const msg = document.getElementById('msgBody').value.trim();
  if (!msg) { showToast('메시지를 입력해주세요'); return; }

  const text = `💌 ${to}에게 보내는 마음\n\n${msg}\n\n— 마로에서 마음을 새기다`;

  if (navigator.share) {
    navigator.share({ title: '마로 메시지 카드', text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('메시지가 복사되었어요 ✨');
    });
  }
}

// ── 토스트 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
