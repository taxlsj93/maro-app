<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>마로 인스타그램 카드 3</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      background: #faf6f1;
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Decorative background */
    .bg-dot-grid {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle, rgba(196,117,110,0.12) 1.5px, transparent 1.5px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Top nav */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 44px 64px 0;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #c4756e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #3a2e2b;
    }
    .series-badge {
      background: rgba(196, 117, 110, 0.12);
      color: #c4756e;
      font-size: 15px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 20px;
    }

    /* Main content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 72px 0;
      position: relative;
      z-index: 1;
    }

    .topic-label {
      font-size: 20px;
      font-weight: 600;
      color: #a89080;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      text-align: center;
    }

    .title-main {
      font-size: 52px;
      font-weight: 800;
      color: #2a1f1c;
      letter-spacing: -2px;
      line-height: 1.15;
      text-align: center;
      margin-bottom: 8px;
    }

    /* Big stat */
    .stat-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 12px 0 20px;
    }
    .stat-number {
      font-size: 110px;
      font-weight: 900;
      color: #c4756e;
      letter-spacing: -6px;
      line-height: 1;
      margin-bottom: 0;
    }
    .stat-label {
      font-size: 32px;
      font-weight: 700;
      color: #2a1f1c;
      letter-spacing: -1px;
      margin-top: -4px;
    }

    /* Reveal box */
    .reveal-box {
      background: #2a1f1c;
      color: #fff;
      border-radius: 18px;
      padding: 24px 48px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.4;
      width: 100%;
    }
    .reveal-box .highlight {
      color: #e8a89e;
    }

    /* Solution checklist */
    .solution-box {
      background: #fff;
      border-radius: 20px;
      padding: 32px 44px;
      width: 100%;
      box-shadow: 0 6px 24px rgba(60, 30, 20, 0.08);
      margin-bottom: 20px;
    }
    .solution-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(196, 117, 110, 0.1);
    }
    .solution-row:last-child {
      border-bottom: none;
    }
    .check-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(196, 117, 110, 0.15);
      color: #c4756e;
      font-size: 16px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .solution-text {
      font-size: 24px;
      font-weight: 600;
      color: #2a1f1c;
      line-height: 1.4;
      letter-spacing: -0.3px;
    }

    /* Summary text */
    .summary-text {
      font-size: 20px;
      font-weight: 600;
      color: #6a4e46;
      text-align: center;
      line-height: 1.6;
      letter-spacing: -0.2px;
    }

    /* CTA Bottom */
    .cta-bar {
      height: 88px;
      background: #c4756e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .cta-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .cta-arrow {
      font-size: 22px;
      color: rgba(255,255,255,0.8);
    }
    .cta-url {
      font-size: 20px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="bg-dot-grid"></div>

  <div class="top-nav">
    <div class="logo">
      <div class="logo-icon">마</div>
      <span class="logo-text">마로</span>
    </div>
    <div class="series-badge">Insight #01</div>
  </div>

  <div class="content">
    <div class="topic-label">친구 생일 선물 고를 때</div>
    <div class="title-main">이것만 조심하세요</div>

    <div class="stat-block">
      <div class="stat-number">80%</div>
      <div class="stat-label">가 하는 실수</div>
    </div>

    <div class="reveal-box">
      <span class="highlight">내가 갖고 싶은 걸</span> 사는 것
    </div>

    <div class="solution-box">
      <div class="solution-row">
        <div class="check-icon">✓</div>
        <div class="solution-text">그 친구가 뭘 좋아하는지</div>
      </div>
      <div class="solution-row">
        <div class="check-icon">✓</div>
        <div class="solution-text">평소에 뭘 자주 쓰는지</div>
      </div>
      <div class="solution-row">
        <div class="check-icon">✓</div>
        <div class="solution-text">최근에 뭘 사고 싶다고 했는지</div>
      </div>
    </div>

    <div class="summary-text">3가지만 떠올리면 실패 없는 선물이 나온다</div>
  </div>

  <div class="cta-bar">
    <span class="cta-text">마로가 대신 골라줄게요</span>
    <span class="cta-arrow">→</span>
    <span class="cta-url">maro.ai.kr</span>
  </div>
</body>
</html>
