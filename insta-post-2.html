<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e0e0e0}
.card{
  width:1080px;height:1080px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#faf6ee 0%,#f5ede3 50%,#faf6f1 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.deco1{position:absolute;width:600px;height:600px;border-radius:50%;background:rgba(196,117,110,.05);top:-200px;left:-150px}
.deco2{position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(196,117,110,.04);bottom:-100px;right:-80px}
.logo{
  position:absolute;top:60px;
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:22px;font-weight:700;
  color:#c4756e;letter-spacing:8px;text-transform:uppercase;
}
/* 아이콘 그리드 */
.icon-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:24px;
  margin-bottom:56px;position:relative;
}
.icon-box{
  width:160px;height:160px;border-radius:28px;
  background:rgba(255,255,255,.6);backdrop-filter:blur(10px);
  border:2px solid rgba(255,255,255,.5);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 20px rgba(164,94,88,.08);
}
.icon-box .emoji{font-size:56px}
.icon-box .label{
  font-family:'Noto Sans KR',sans-serif;font-size:17px;font-weight:500;color:#5a4a3a;
}
/* 메인 텍스트 */
.headline{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:56px;font-weight:700;
  color:#2d2018;text-align:center;line-height:1.45;margin-bottom:20px;
  position:relative;
}
.headline em{font-style:normal;color:#c4756e}
.sub{
  font-family:'Noto Sans KR',sans-serif;font-size:24px;
  color:#8a7a73;text-align:center;line-height:1.6;position:relative;
}
.domain{
  position:absolute;bottom:56px;
  font-family:'Noto Sans KR',sans-serif;font-size:18px;color:#8a7a73;letter-spacing:3px;
}
</style>
</head>
<body>
<div class="card">
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="logo">MARO</div>
  <div class="icon-grid">
    <div class="icon-box"><span class="emoji">💕</span><span class="label">연인</span></div>
    <div class="icon-box"><span class="emoji">👨‍👩‍👧</span><span class="label">부모님</span></div>
    <div class="icon-box"><span class="emoji">💛</span><span class="label">친구</span></div>
    <div class="icon-box"><span class="emoji">🤝</span><span class="label">동료</span></div>
  </div>
  <div class="headline">같은 5만원도<br><em>관계</em>에 따라 다릅니다</div>
  <div class="sub">마로는 관계의 깊이까지 고려해요</div>
  <div class="domain">maro.ai.kr</div>
</div>
</body>
</html>
