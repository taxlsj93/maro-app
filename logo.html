<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f0f0}
.logo-wrap{width:1080px;height:1080px;background:#c4756e;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.logo-deco{position:absolute;width:100%;height:100%;top:0;left:0;opacity:.08}
.logo-deco::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:#fff;top:-200px;right:-200px}
.logo-deco::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:#fff;bottom:-150px;left:-100px}
.logo-icon{width:160px;height:160px;border-radius:40px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin-bottom:48px;border:3px solid rgba(255,255,255,.25);backdrop-filter:blur(10px)}
.logo-icon span{font-size:80px;color:#fff}
.logo-text{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:120px;font-weight:700;color:#fff;letter-spacing:24px;margin-bottom:16px}
.logo-sub{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:28px;color:rgba(255,255,255,.7);letter-spacing:8px}
</style>
</head>
<body>
<div class="logo-wrap">
  <div class="logo-deco"></div>
  <div class="logo-icon"><span>&#9829;</span></div>
  <div class="logo-text">MARO</div>
  <div class="logo-sub">마음을 새기는 선물</div>
</div>
</body>
</html>
