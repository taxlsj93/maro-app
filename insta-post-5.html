<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e0e0e0}
.card{
  width:1080px;height:1080px;position:relative;overflow:hidden;
  background:linear-gradient(170deg,#f7f0e8 0%,#f0e6da 30%,#faf4ee 60%,#efe3d5 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
.deco1{position:absolute;width:600px;height:600px;border-radius:50%;background:rgba(196,117,110,.05);top:-200px;right:-150px}
.deco2{position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(196,117,110,.04);bottom:-80px;left:-40px}
.logo{
  position:absolute;top:60px;
  font-size:22px;font-weight:700;color:#c4756e;letter-spacing:8px;text-transform:uppercase;
}
.quote-mark{
  font-size:120px;color:rgba(196,117,110,.15);
  position:relative;line-height:1;margin-bottom:-20px;
  font-family:Georgia,serif;
}
.headline{
  font-size:52px;font-weight:700;color:#2d2018;
  text-align:center;line-height:1.55;margin-bottom:32px;position:relative;
  max-width:800px;
}
.headline em{font-style:normal;color:#c4756e}
.line{
  width:60px;height:3px;background:#c4756e;border-radius:2px;
  margin-bottom:32px;position:relative;opacity:.5;
}
.story{
  font-size:28px;font-weight:400;color:#6a5a4a;
  text-align:center;line-height:1.8;position:relative;
  max-width:700px;
}
.emoji-row{
  position:absolute;bottom:120px;
  display:flex;gap:16px;font-size:36px;opacity:.3;
}
.domain{
  position:absolute;bottom:56px;
  font-size:18px;color:#8a7a73;letter-spacing:3px;
}
</style>
</head>
<body>
<div class="card">
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="logo">MARO</div>
  <div class="quote-mark">"</div>
  <div class="headline">선물은 물건이 아니라<br><em>마음의 증거</em>예요</div>
  <div class="line"></div>
  <div class="story">친구가 건넨 편의점 삼각김밥 하나가<br>그해 받은 선물 중 제일 좋았어요.<br><br>"너 요즘 밥 안 먹고 다닌다며"</div>
  <div class="emoji-row">
    <span>🍙</span><span>💌</span><span>🤍</span>
  </div>
  <div class="domain">maro.ai.kr</div>
</div>
</body>
</html>
