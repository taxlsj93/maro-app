.pick-card{

  animation:cardIn .6s ease both;
}
.pick-card:nth-child(1){animation-delay:.1s}
.pick-card:nth-child(2){animation-delay:.25s}
.pick-card:nth-child(3){animation-delay:.4s}
.pick-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(164,94,88,.15)}

@keyframes cardIn{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

.pick-price{font-size:1.1rem;font-weight:700;color:var(--terra-dark)}
.pick-tags{display:flex;gap:4px;flex-wrap:wrap}

  newyear: { // 설날 (음력 1월 1일)
    2025:[1,29], 2026:[2,17], 2027:[2,6],  2028:[1,26], 2029:[2,13],

// 음력 기념일의 양력 범위 계산 (당일 기준 앞뒤 며칠)
function getLunarRange(key, year) {
  const table = LUNAR_DATES[key];
  if (!table || !table[year]) return null;
  const [m, d] = table[year];
  const base = new Date(year, m - 1, d);
  const before = new Date(base); before.setDate(base.getDate() - 3); // 3일 전부터
  const after  = new Date(base); after.setDate(base.getDate() + 1);  // 당일 다음날까지
  return [before.getMonth()+1, before.getDate(), after.getMonth()+1, after.getDate()];
}

// ── 날짜 기반 세트 선택 ──
function getTodaySet(){
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();

  // 시즌/기념일 특별 세트 확인
  for (const key in SPECIAL_PICKS) {
    const sp = SPECIAL_PICKS[key];

    // 음력 기념일이면 동적으로 range 계산
    let range;
    if (sp.lunar) {
      range = getLunarRange(key, y);
      if (!range) continue; // 룩업 테이블에 해당 연도 없으면 스킵
    } else {
      range = sp.range;
    }

    const [sm, sd, em, ed] = range;
    if ((m > sm || (m === sm && d >= sd)) && (m < em || (m === em && d <= ed))) {
      return { special: sp };
    }
  }

  // 기본 로테이션
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / 86400000);
  return { picks: GIFT_POOL[dayOfYear % GIFT_POOL.length] };
}

function formatDate(){
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}

// ── 렌더 ──
document.getElementById('todayDate').textContent = formatDate();

const result = getTodaySet();
const container = document.getElementById('picksList');

// 특별 시즌이면 히어로 텍스트 변경
if (result.special) {
  const sp = result.special;
  document.querySelector('.hero h1').innerHTML = sp.title;
  document.querySelector('.hero-sub').textContent = sp.sub;
}

const pickItems = result.special ? result.special.picks : result.picks;

pickItems.forEach((g, i) => {
  const card = document.createElement('div');
  card.className = 'pick-card';
  card.innerHTML = `
    <div class="pick-rank">${g.rank}</div>
    <div class="pick-img-wrap">
      <span class="emoji-placeholder">${g.emoji}</span>
    </div>
    <div class="pick-body">
      <div class="pick-occasion">${g.occasion}</div>
      <div class="pick-name">${g.name}</div>
      <div class="pick-reason">${g.reason}</div>
      <div class="pick-meta">
        <span class="pick-price">${g.price}</span>
        <div class="pick-tags">${g.tags.map(t=>`<span class="pick-tag">${t}</span>`).join('')}</div>
      </div>
      <a href="${coupangLink(g.name)}" target="_blank" rel="noopener" class="pick-cta">쿠팡에서 보기 →</a>
    </div>
  `;
  container.appendChild(card);
});
</script>
