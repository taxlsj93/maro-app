<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --terra:#c4756e;--terra-dark:#a85e58;--terra-light:#e8ada8;--terra-pale:#fdf5f4;
  --cream:#faf6f1;--warm-gray:#6b5e57;--text:#3d2f2a;--text-light:#8a7a73;
  --card-bg:#fff;--shadow:0 2px 16px rgba(164,94,88,.10);
}
html{font-size:16px}
body{
  font-family:'Gowun Batang',serif;background:var(--cream);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
}

/* Header */
.maro-header{
  text-align:center;padding:40px 20px 0;
}
.maro-logo{
  font-size:.85rem;letter-spacing:6px;text-transform:uppercase;color:var(--terra);
  font-weight:700;margin-bottom:4px;
}
.maro-tagline{font-size:.72rem;color:var(--text-light);letter-spacing:2px}

/* Hero */
.hero{
  text-align:center;padding:36px 20px 20px;
}
.hero-date{
  display:inline-block;font-size:.7rem;color:var(--terra);
  border:1px solid var(--terra-light);border-radius:20px;
  padding:4px 16px;margin-bottom:16px;letter-spacing:1px;
}
.hero h1{
  font-size:1.6rem;font-weight:700;line-height:1.5;margin-bottom:8px;
  color:var(--text);
}
.hero h1 em{font-style:normal;color:var(--terra)}
.hero-sub{font-size:.85rem;color:var(--text-light);line-height:1.6}

/* Cards */
.picks{padding:12px 16px 40px;max-width:480px;margin:0 auto}
.pick-card{
  background:var(--card-bg);border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow);margin-bottom:20px;
  transition:transform .25s ease,box-shadow .25s ease;
  animation:cardIn .6s ease both;
}
.pick-card:nth-child(1){animation-delay:.1s}
.pick-card:nth-child(2){animation-delay:.25s}
.pick-card:nth-child(3){animation-delay:.4s}
.pick-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(164,94,88,.15)}

@keyframes cardIn{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

.pick-rank{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--terra);color:#fff;
  font-size:.68rem;font-weight:700;letter-spacing:1px;
  padding:6px 14px;border-radius:0 0 12px 0;
}
.pick-img-wrap{
  width:100%;aspect-ratio:5/3;background:var(--terra-pale);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  position:relative;
}
.pick-img-wrap .emoji-placeholder{font-size:3.5rem}
.pick-img-wrap img{width:100%;height:100%;object-fit:cover}

.pick-body{padding:20px}
.pick-occasion{
  font-size:.68rem;color:var(--terra);font-weight:700;
  letter-spacing:1px;margin-bottom:6px;
}
.pick-name{font-size:1.05rem;font-weight:700;line-height:1.5;margin-bottom:6px}
.pick-reason{
  font-size:.82rem;color:var(--text-light);line-height:1.7;
  margin-bottom:14px;
  border-left:2px solid var(--terra-light);padding-left:12px;
}
.pick-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.pick-price{font-size:1.1rem;font-weight:700;color:var(--terra-dark)}
.pick-tags{display:flex;gap:4px;flex-wrap:wrap}
.pick-tag{
  font-size:.62rem;background:var(--terra-pale);color:var(--terra);
  padding:3px 8px;border-radius:10px;
}
.pick-cta{
  display:block;width:100%;text-align:center;
  background:var(--terra);color:#fff;font-family:'Gowun Batang',serif;
  font-size:.88rem;font-weight:700;padding:14px;
  border:none;border-radius:12px;cursor:pointer;
  text-decoration:none;letter-spacing:1px;
  transition:background .2s;
}
.pick-cta:hover{background:var(--terra-dark)}

/* Refresh hint */
.refresh-hint{
  text-align:center;padding:0 20px 40px;
  font-size:.75rem;color:var(--text-light);line-height:1.7;
}
.refresh-hint span{color:var(--terra)}

/* Footer */
.maro-footer{
  text-align:center;padding:24px 20px 36px;
  border-top:1px solid rgba(196,117,110,.12);
}
.maro-footer a{
  color:var(--terra);text-decoration:none;font-size:.78rem;font-weight:700;
  letter-spacing:2px;
}
.footer-sub{font-size:.68rem;color:var(--text-light);margin-top:6px}

@media(max-width:380px){
  .hero h1{font-size:1.35rem}
  .pick-body{padding:16px}

function getTodaySet(){
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / 86400000);
  return GIFT_POOL[dayOfYear % GIFT_POOL.length];
}

function formatDate(){
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}

      <a href="${g.link}" target="_blank" rel="noopener" class="pick-cta">쿠팡에서 보기 →</a>
    </div>
  `;
  container.appendChild(card);
});
</script>
</body>
</html>
